      "body": "<div class=\"esect\"><div class=\"esect-label\">Idea</div><ul><li>LensLock is a health app that copies the Alarmy model but applies it to contact lens anxiety instead of waking up. You stick a cheap NFC tag on your lens case once, tap when you put your lenses in, and the app starts a wear-time clock that turns hostile near bedtime if you have not tapped the case to confirm removal. The reveal is instant and screen-recordable: a red screen says &#x27;You&#x27;ve worn these lenses 15h 42m. Sleep in them tonight and tomorrow shifts into high-irritation risk,&#x27; plus a live countdown and escalating alerts until you clear it. The core loop is tap in, wear, tap out, protect your clean-eye streak, and come back because contact lens laziness is a daily problem.</li></ul></div>"

      "score": "4/10",
      "body": "<div class=\"esect\"><div class=\"esect-label\">What&#x27;s Good</div><ul><li>The pain is real. Contact lens users absolutely do stupid, lazy things at night, and &quot;you are about to sleep in your lenses&quot; is a concrete, emotionally loaded moment.</li><li>The tap-in/tap-out loop is simple enough to explain in one sentence, which is more than most health-app ideas can say.</li><li>The &quot;hostile red screen&quot; is at least a distinct marketing surface. It is screenshotable, dramatic, and easier to pitch than generic wellness sludge.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>This is a compliance app for an already small niche inside a niche. First you need people who wear contacts, then people who wear reusable contacts, then people careless enough to need policing, then people motivated enough to install an app to fix that behavior. That funnel is not a market; it is a leak.</li><li>The whole differentiator depends on NFC being frictionless and reliable in the exact daily moments users are half-asleep, distracted, or in a bathroom. That is UNVERIFIED. If the tag read is flaky, slow, platform-limited, or feels stupid after three days, the entire gimmick collapses.</li><li>You are copying Alarmy without copying the actual urgency. Oversleeping has an obvious next-morning consequence. Sleeping in contacts is probabilistic. Many users have done it before and gotten away with it, which means your app is fighting human anecdotal stupidity with a timer. Good luck.</li><li>&quot;Turns hostile near bedtime&quot; sounds clever in a pitch and annoying in real life. If the app becomes shrill too early, users mute it. If it waits too long, it is useless. Congratulations, you built a precision nagging problem.</li><li>The app assumes a single clean daily cycle: put lenses in, wear them, remove them. Real behavior is messier. People nap, reinsert, swap cases, wear dailies, wear extended-wear lenses, forget to tap, or leave the case in another room. Your data quality becomes garbage immediately.</li><li>The health framing creates trust expectations you probably cannot meet. If you show &quot;high-irritation risk&quot; language, users will assume some clinical basis. Do you actually have medically defensible risk logic by lens type, wear schedule, and user condition, or are you generating scary red text and hoping nobody asks questions?</li><li>The retention story is weak. Once someone builds the habit, the app becomes unnecessary. If they do not build the habit, they churn. You are trying to monetize a tool whose success state is making itself disposable.</li><li>The &quot;clean-eye streak&quot; is generic habit-app sugar sprinkled on a narrow use case. Streaks do not magically create long-term retention when the underlying action is physically annoying and easy to ignore.</li><li>Screen-recordable is not a business model. It is founder bait. People are not dying to post their eye-care shame dashboard on social media.</li><li>There is a decent chance the best version of this is not an app at all. It might be a pack-in NFC sticker plus a super-light reminder utility, which is a much smaller business than this pitch wants to imply.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — a stripped-down single-platform MVP with manual tap-in/tap-out, local notifications, streaks, and a basic timer is feasible. The NFC-first, always-reliable, health-sounding version is where the solo scope starts lying to you.</li><li>Biggest solo complexity traps: cross-platform NFC behavior differences; background notification reliability near bedtime; handling missed or incorrect taps without corrupting the wear log; health/risk messaging that sounds credible without creating liability; building enough onboarding and habit logic to make the app usable for different lens types; discovering too late that the target market is too small and too low-intent to retain.</li></ul></div>"

      "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Replaced NFC and the &quot;hostile red screen&quot; with a manual bedtime closeout flow plus local reminders. This directly fixes the biggest technical and UX risk from the critique: the product no longer lives or dies on flaky tag reads or novelty nagging.</li><li>Narrowed the audience to reusable soft-lens wearers on non-extended schedules and changed the promise from &quot;high-irritation risk&quot; to &quot;you are past your planned wear window&quot; or &quot;you are heading to bed with lenses still in.&quot; This makes the logic understandable, safer, and more credible because it is based on user-set rules instead of fake medical precision.</li><li>Added ongoing utility beyond one daily timer: pair-replacement countdown, case-replacement reminders, missed-log recovery, and a weekly bedtime compliance summary. This fixes the retention problem by giving users a reason to come back in week 2 even after the novelty of the timer is gone.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">MVP Scope</div><ul><li>What&#x27;s in v1: onboarding for reusable soft lenses only; manual `Start wearing` and `Close out tonight` actions; bedtime local reminders; planned wear-window overage messages; missed-log recovery flow; pair replacement countdown; lens-case replacement reminder; nightly history; weekly compliance summary; trust-setting disclaimer copy; small rules/content set for messages, reminder states, and help text.</li><li>What&#x27;s out of v1: NFC under any name; hostile/shaming alerts; clinical risk scores; dailies support; extended-wear lens support; photo scanning; Apple Health integrations; social sharing; streak gamification; community features; user-generated advice; payments; cross-platform sync; wearable integrations.</li><li>Estimated build time with AI coding tools: 2.5-3.5 weeks total, including 1-2 days to define the rule copy and replacement logic, 7-9 days for UI and app logic, 2-3 days for notification/integration setup, 1-2 days for local storage and missed-log recovery handling, 1 day for content prep of reminder states/help text/disclaimer copy, and 2-3 days for QA and iteration.</li></ul></div>"

      "body": "<div class=\"esect\"><div class=\"esect-label\">What&#x27;s Good</div><ul><li>You cut the two dumbest parts of v1: NFC theater and fake clinical confidence. That alone makes this version far less fragile.</li><li>The scope is finally believable for a solo developer. Local state, notifications, simple rules, and a narrow workflow are the kind of boring constraints that actually ship.</li><li>The bedtime closeout framing is better than &quot;contact lens health app.&quot; It targets a specific failure moment instead of pretending to manage eye care broadly.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>This is still a reminder app wearing a clever costume. &quot;Bedtime closeout assistant&quot; is a nicer phrase for &quot;please press a button so you do not forget something you already know.&quot;</li><li>Your real competitor is not another startup. It is a phone alarm, a recurring reminder, a sticky note, or putting the lens case somewhere impossible to ignore. If your dedicated app is only marginally better than those hacks, most people will not bother.</li><li>The niche is brutally narrow. You need reusable soft-lens wearers, who regularly mess this up, who feel enough pain to try a dedicated app, but not enough discipline to solve it with a free generic tool. That is not a large audience. It is a behavioral edge case.</li><li>The retention answer is improved, but still shaky. Pair replacement countdown and case reminders are weak secondary value, not magnetic value. Ask the hard question: Why does the user come back after day 1? Because if the honest answer is &quot;for another reminder,&quot; your retention loop is thin.</li><li>The product&#x27;s success state still threatens the business. If the app works, users may need it less. If it does not work, they churn. You have not escaped the self-liquidating habit-app trap; you just made it slightly less obvious.</li><li>Missed-log recovery sounds practical until you watch real humans use it. &quot;About what time did you put them in?&quot; is exactly the kind of annoying reconstruction step people skip or guess badly. Once the timing gets fuzzy, your overage messaging gets softer, and the core value gets mushier.</li><li>The weekly summary is trying very hard to manufacture week-2 utility out of lightweight data. Most users do not crave analytics about how often they almost slept in contacts. That sounds useful in a product doc and forgettable in real life.</li><li>You keep claiming this is small because the logic is simple, but the copy burden is doing more work than the code. Reminder wording, trust language, recovery states, edge cases, and &quot;not medical advice but still urgent enough to act&quot; messaging will eat far more product time than you are admitting.</li><li>Narrowing to biweekly and monthly reusable lenses helps, but it also exposes how fragile the market is. Every restriction makes the product more coherent and less commercially interesting.</li><li>There is no real moat here. If users prove they want this, the insight is easy to copy. If users do not prove they want it, there is nothing here to defend anyway.</li><li>The idea is better, but &quot;better than a bad version&quot; is not the same as &quot;worth real effort.&quot; You fixed the obvious execution traps. You have not proven the dedicated-product case.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the trimmed single-platform MVP is feasible, but only if you stop pretending every support feature is essential and keep the first version brutally small.</li><li>Biggest solo complexity traps: notification timing and permission drop-off; messy daily logging behavior that corrupts the main value; writing enough precise, trustworthy copy for every state; overbuilding dashboards and summaries to patch weak retention; confusing &quot;safety uding 1 day for notification and state-flow copy/content prep, 4-5 days for UI build and local state logic, 2-3 days for notification/integration setup and permission handling, 1 day for score/history data modeling, and 1-2 days for QA on reminder timing, edge cases, and onboarding drop-off.</li></ul></div>"

      "body": "<div class=\"tag-row\"><span class=\"etag green\">Ready for design</span><span class=\"etag blue\">MOBILE</span></div><div class=\"esect\"><div class=\"esect-label\">Validation Score</div><ul><li>6/10</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Validated At</div><ul><li>2026-04-03 05:27</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff Screens</div><ul><li>Welcome / 14-Night Challenge Intro</li><li>Onboarding / Bedtime Setup</li><li>Home / Tonight Status</li><li>Bedtime Closeout Modal / Screen</li><li>Reminder Escalation / Still In State</li><li>Challenge History / Scorecard</li><li>Settings</li></ul></div>"
    },
    {
      "status": "design",
      "icon": "🎨",
      "title": "Designed",
      "desc": "Generated a live Stitch-based mobile prototype and prepared it for publishing.",
      "body": "<div class=\"esect\"><div class=\"esect-label\">Design Output</div><ul><li>7 mobile screens generated in Stitch and wired into a clickable prototype.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Device Type</div><ul><li>MOBILE</li></ul></div><div class=\"esect\"><a class=\"ext-link\" href=\"https://stitch.withgoogle.com/projects/1375077488937730689\" target=\"_blank\" rel=\"noreferrer\">Open Stitch project</a></div>"
    }

};

<body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
