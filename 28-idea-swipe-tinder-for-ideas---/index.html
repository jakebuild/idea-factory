<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1a;
    color: #f9fafb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .idea-num {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: #3b82f6; background: #1e3a5f;
    padding: 3px 10px; border-radius: 99px;
    flex-shrink: 0;
  }
  .idea-title { font-size: 1.1rem; font-weight: 700; color: #f9fafb; }
  .idea-sub { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    border-radius: 99px; padding: 4px 12px;
    font-size: 0.75rem; color: #9ca3af;
  }
  .score-pill {
    background: #1a2e1a; border: 1px solid #2d4a2d;
    color: #86efac; font-size: 0.75rem; font-weight: 700;
    padding: 4px 12px; border-radius: 99px;
  }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    color: #9ca3af; font-size: 0.75rem;
    padding: 4px 12px; border-radius: 99px;
    cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn:hover { background: #1f2937; color: #f9fafb; border-color: #374151; }

  /* ── Body ────────────────────────────────────────── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
    align-items: stretch;
  }

  /* ── Phone column ────────────────────────────────── */
  .phone-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    gap: 16px;
    background: #0a0f1a;
    overflow: hidden;
  }

  /* MOBILE frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #0f172a,
      0 0 0 11px rgba(255,255,255,0.06),
      0 50px 100px rgba(0,0,0,0.7);
    background: #000;
    flex-shrink: 0;
  }

  /* WEB frame */
  .web-frame {
    width: min(900px, calc(100% - 80px));
    height: min(640px, calc(100vh - 180px));
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.6);
    background: #1f2937;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .web-chrome {
    height: 36px;
    background: #1f2937;
    border-bottom: 1px solid #374151;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .web-chrome .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .web-chrome .dot-r { background: #ef4444; }
  .web-chrome .dot-y { background: #f59e0b; }
  .web-chrome .dot-g { background: #22c55e; }
  .web-chrome .url {
    flex: 1; background: #111827; border-radius: 4px;
    height: 20px; margin: 0 8px;
    display: flex; align-items: center; padding: 0 10px;
    font-size: 0.68rem; color: #6b7280;
  }

  .device-iframe {
    width: 100%; height: 100%;
    border: none; display: block;
    flex: 1;
  }

  /* Switcher */
  .switcher {
    display: flex; gap: 6px;
    flex-wrap: wrap; justify-content: center;
    max-width: 600px;
  }
  .switcher button {
    height: 28px; padding: 0 10px;
    border-radius: 6px; border: 1px solid #1f2937;
    background: #111827; color: #6b7280;
    font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .switcher button:hover { background: #1f2937; color: #d1d5db; border-color: #374151; }
  .switcher button.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }

  /* ── Resize handle ───────────────────────────────── */
  .resize-handle {
    width: 8px;
    flex-shrink: 0;
    cursor: col-resize;
    position: relative;
    background: transparent;
    z-index: 10;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    left: 3px; top: 0; bottom: 0;
    width: 2px;
    background: #1a2235;
    transition: background 0.15s;
  }
  .resize-handle:hover::after { background: #374151; }
  .resize-handle.dragging::after { background: #3b82f6; }

  /* ── Timeline column ─────────────────────────────── */
  .timeline-col {
    width: 460px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    background: #0d1424;
  }
  .timeline-col.collapsed { width: 0; }

  .timeline-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .timeline-header h2 {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #4b5563;
  }

  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 40px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

  /* ── Timeline line + dots ────────────────────────── */
  /* --lx: horizontal center of the line/dots from .timeline-line left edge */
  .timeline-line {
    --lx: 8px;
    position: relative;
    padding-left: 28px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
  }
  .timeline-line::before {
    content: '';
    position: absolute;
    left: calc(var(--lx) - 1px); /* 2px line centered at --lx */
    top: 10px; bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, #1e3a5f 0%, #1f2937 100%);
    border-radius: 2px;
  }

  .entry {
    position: relative;
    margin-bottom: 10px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: -25px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
    top: 18px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1f2937;
    border: 2px solid #374151;
    z-index: 1;
  }
  .entry.s-critique::before { background: #78350f; border-color: #d97706; }
  .entry.s-improve::before  { background: #1e3a5f; border-color: #3b82f6; }
  .entry.s-validate::before { background: #14532d; border-color: #16a34a; }
  .entry.s-design::before   { background: #312e81; border-color: #6366f1; }

  /* ── Entry cards ─────────────────────────────────── */
  .entry-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: #374151; }

  .entry-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer; user-select: none;
  }
  .entry-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 0.85rem; font-weight: 600; color: #f9fafb;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    line-height: 1.3;
  }
  .entry-desc { font-size: 0.72rem; color: #6b7280; margin-top: 3px; }
  .entry-chevron {
    color: #374151; font-size: 0.6rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .entry.open .entry-chevron { transform: rotate(180deg); color: #6b7280; }

  .verdict {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .verdict-needs { background: #451a03; color: #fb923c; }
  .verdict-worth { background: #14532d; color: #86efac; }
  .verdict-kill  { background: #450a0a; color: #f87171; }
  .escore { font-size: 0.7rem; font-weight: 700; color: #60a5fa; }

  .entry-body {
    display: none;
    border-top: 1px solid #1f2937;
    padding: 14px;
    font-size: 0.76rem; color: #9ca3af; line-height: 1.65;
  }
  .entry.open .entry-body { display: block; }

  .esect { margin-top: 10px; }
  .esect:first-child { margin-top: 0; }
  .esect-label {
    font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #4b5563; margin-bottom: 5px;
  }
  .esect ul { padding-left: 14px; }
  .esect li { margin-bottom: 3px; color: #9ca3af; }
  .esect p { color: #9ca3af; }
  .esect strong { color: #d1d5db; font-weight: 600; }
  .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .etag {
    background: #0a0f1a; border: 1px solid #1f2937;
    border-radius: 4px; padding: 2px 7px;
    font-size: 0.66rem; color: #6b7280;
  }
  .etag.green { border-color: #14532d; color: #86efac; }
  .etag.blue  { border-color: #1e3a5f; color: #60a5fa; }
  a.ext-link { color: #818cf8; text-decoration: none; }
  a.ext-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
