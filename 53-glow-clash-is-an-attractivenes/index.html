<script>window.IDEA_DATA = {"ideaNum":53,"title":"Glow Clash","sub":"Pre-event irritation checker for strong skincare routines.","score":"6/10","deviceType":"WEB","stitchId":"5640700694548438258","startScreen":0,"screens":[{"id":"f40a5ab6deb94a27a2ea7804f20c9b73","label":"Landing / Value Proposition"},{"id":"019cb3b5a1e542db959acf466d1fd274","label":"Onboarding / How To Use It"},{"id":"96e5494defcb4a51ab6757bb87855d05","label":"Routine Check / Step Cards"},{"id":"4e642882becc4edbb45a4b83f8c85c59","label":"Results / Risk Verdict"},{"id":"c0a88e45b52a4db9a0ec6c0bc62ecc01","label":"Rule Detail / Why It Was Flagged"},{"id":"a9dd637df92d46259bcae697f8fe5cb1","label":"Next-Morning Log"},{"id":"79e27504adcd440c9f861be8ca0048ec","label":"Recent Checks"}],"timeline":[{"status":"","icon":"💡","title":"Original Idea","desc":"Glow Clash is an attractiveness app that copies the Cal AI model but applies it to skincare anxiety instead of calories.","body":"<div class='esect'><div class='esect-label'>Description</div><p>Glow Clash is an attractiveness app that copies the Cal AI model but applies it to skincare anxiety instead of calories. You scan the skincare products you plan to use tonight, and the app flags ingredient collisions that commonly lead to redness, peeling, breakouts, or next-morning irritation before a date, event, or photo day. The reveal is instant and screen-recordable: a blunt warning that says your routine is likely to make your face look worse by morning, plus the single product to remove so the loop becomes scan, get the verdict, swap one thing, and check your face tomorrow.</p></div>"},{"status":"critique","icon":"🔍","title":"Critique v1","desc":"The idea is built on fake certainty.","verdict":"NEEDS MAJOR WORK","verdictClass":"needs","score":"4/10","body":"<div class='esect'><div class='esect-label'>What's Good</div><ul><li>The hook is clean and emotionally legible. \"Will this routine make my face look worse by morning?\" is a real fear, not some made-up productivity fantasy.</li><li>The user moment is specific and high intent: before a date, event, or photo day. That is better than a vague \"optimize your skincare\" pitch.</li><li>The \"remove one product\" output is the right shape for consumer behavior. Simple verdicts beat dermatology cosplay.</li><li>A stripped-down version could be a decent content-led utility if it stops pretending to be more scientific than it is.</li></ul></div><div class='esect'><div class='esect-label'>Brutal Feedback</div><ul><li>The idea is built on fake certainty. Skincare irritation is not a clean collision problem where the app can reliably say \"your face will look worse by morning\" from a product scan. Skin response depends on skin barrier health, frequency of use, concentration, order, prior tolerance, climate, timing, and plain bad luck.</li><li>The \"single product to remove\" output sounds elegant, but it implies causal confidence you almost certainly do not have. If three actives are piled together, which one gets blamed? The app will be guessing with a stern tone.</li><li>You are dragging yourself into product-data hell on day one. Ingredient lists are inconsistent, brands reformulate, names are messy, and the same product can appear in different regional variants. Saying the content is \"ready\" because products exist on shelves is nonsense. The real work is structuring and maintaining a clean ingredient database, which is significant manual labor.</li><li>UNVERIFIED: the scanning flow depends on accurately identifying products and extracting ingredient lists from packaging, barcodes, or external product databases. If that lookup layer is not already proven, the core differentiator is unverified and the idea cannot score above 7/10. Right now it does not deserve anything close to that anyway.</li><li>Even if lookup works, the advice engine is still mostly a glorified rules table wearing an AI costume. Retinoid plus exfoliating acid plus benzoyl peroxide equals irritation risk. Vitamin C plus everything under the sun gets oversimplified. Users can already find endless charts with this logic for free.</li><li>The product makes a dangerous promise in a high-trust category. Wrong calorie estimates are annoying. Wrong skincare advice can burn someone's face before an event. That is a much worse failure mode.</li><li>The next-morning outcome is also slippery. Redness, peeling, and burning are somewhat connected to routine conflicts. Breakouts by morning are much less clean. The app is bundling different skin outcomes into one dramatic verdict because it sounds punchier, not because the prediction is credible.</li><li>The \"screen-recordable blunt warning\" angle is not a moat. It is just an aesthetic wrapper around fear. If the answer quality is mediocre, screen-recordability becomes a viral mechanism for mocking the app.</li><li>The retention loop is weak. Why does the user come back after day 1? Once the app teaches the obvious lesson that stacking too many harsh actives before an event is dumb, the habit collapses unless the user is constantly buying new products or chronically anxious.</li><li>There is no defensible wedge yet. Dermatologists have authority. Existing skincare apps have product libraries. Reddit has obsessive ingredient threads. Beauty creators have audience trust. You are a solo builder shipping a scanner plus heuristics into a category full of better-known voices.</li><li>This is also scope bait for a solo dev. Product recognition, ingredient normalization, conflict rules, confidence scoring, history tracking, and outcome feedback sound manageable in a pitch. In practice that is how you lose three weeks building a product lookup system and still do not have trustworthy advice.</li><li>The phrase \"copies the Cal AI model\" is a warning sign, not a strategy. Cal AI works because calorie logging is frequent and users accept approximation. Skincare collision checking is far less frequent and much less forgiving of wrong outputs.</li></ul></div><div class='esect'><div class='esect-label'>Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — but only after gutting the scanner dependence, narrowing the claim to irritation-risk heuristics, and accepting that v1 is basically a polished rules engine with manual input.</li><li>Biggest solo complexity traps: product recognition, OCR on ingredient labels, dependence on unverified product/ingredient APIs, formula normalization across brands, overclaiming medical-style certainty, calibrating risk outputs without real outcome data, and inventing retention beyond first-use curiosity.</li></ul></div>"},{"status":"improve","icon":"✨","title":"Improved v2","desc":"Build Glow Clash as a cautious web app for people who already use strong actives and want a safer routine the night before a date, event, or photo day.","body":"<div class='esect'><div class='esect-label'>What Changed</div><ul><li>Scanning, product recognition, and ingredient database dependency are removed from v1. Users build a routine manually from a fixed list of active categories such as retinoid, AHA/BHA exfoliant, benzoyl peroxide, vitamin C, prescription acne treatment, scrub, and barrier-repair products. This fixes the biggest solo-dev trap in the critique: unverified scanner accuracy and product-data maintenance.</li><li>The promise is narrowed from \"your face will look worse by morning\" to \"higher irritation risk before an event.\" The app no longer predicts breakouts or pretends it knows exactly which product caused the issue. Instead it shows the conflict rule, the reason, and a caution level. This makes the advice safer and more credible.</li><li>The product shifts from one-off warning tool to \"pre-event routine planner + next-day sensitivity log.\" Users save their usual routine templates, run an event check the night before, and log what happened the next morning. This answers the critique's retention problem: week-2 value comes from building a personal sensitivity record, not from repeating generic infographic advice.</li></ul></div><div class='esect'><div class='esect-label'>MVP Scope</div><ul><li>What's in v1: responsive web app, onboarding that explains the caution-first positioning, manual routine builder from a fixed taxonomy of active categories, pre-event irritation check with explicit rule explanations and caution levels, saveable routine templates, next-day outcome check-in, simple personal pattern history, and local auth/storage</li><li>What's out of v1: scanning, barcode lookup, OCR, product-name search, ingredient parsing, breakout prediction, \"face will look worse by morning\" copy, personalized medical claims, social sharing loops, UGC, community advice, moderation, payments, subscriptions, native mobile apps, push notifications, and brand/product partnerships</li><li>Estimated build time with AI coding tools: 2-3 weeks total, including 2-3 days to define and QA the active-category taxonomy and conflict rules, 6-8 days for UI and app logic, 2-3 days for auth/storage/integration setup, 2-3 days for next-day logging/history views, and 1-2 days for copy, safety disclaimers, and QA</li></ul></div>"},{"status":"critique","icon":"🔍","title":"Critique v2","desc":"The product is still mostly a skinned infographic with a memory feature.","verdict":"NEEDS MAJOR WORK","verdictClass":"needs","score":"6/10","body":"<div class='esect'><div class='esect-label'>What's Good</div><ul><li>You did the one smart thing v1 refused to do: you murdered the scanner gimmick before it murdered the build. That removes the dumbest technical trap.</li><li>The wedge is finally specific. \"Night-before-event irritation checker for people using strong actives\" is at least a real use case instead of vague beauty-tech sludge.</li><li>The output format is better. Explicit rules, caution levels, and fallback suggestions are more credible than fake clairvoyance.</li><li>This is small enough to ship as a web app without needing a team, ML pipeline, or vendor circus.</li></ul></div><div class='esect'><div class='esect-label'>Brutal Feedback</div><ul><li>The product is still mostly a skinned infographic with a memory feature. The core insight is \"do not stack harsh actives before an important day.\" That is not product magic. That is beginner skincare advice with a progress bar.</li><li>Your moat is weak to nonexistent. Anyone with a decent prompt and a weekend can clone this rules engine. If the main value is the rules table plus a log, there is no defensibility and barely any novelty.</li><li>The retention story is still doing wishful thinking cosplay. \"Personal sensitivity history\" sounds nice, but it depends on users caring enough to log the next morning after a stressful event. Most people will forget, get busy, or not want to think about their skin again. Why does the user come back after day 1?</li><li>UNVERIFIED: the entire week-2 value depends on repeated next-day logging being high enough to produce useful patterns. Until that behavior is proven, this cannot justify a premium score.</li><li>The taxonomy problem did not disappear. You replaced product-data hell with categorization friction. Real users do not think in neat buckets like \"leave-on exfoliant\" versus \"prescription acne treatment\" when one product can be both, or when packaging language is muddy. If users cannot confidently map their routine into your categories, the app feels dumb immediately.</li><li>The rules are not \"ready.\" They require meaningful manual work: selecting safe conflict rules, writing explanations, deciding severity thresholds, handling ambiguous combinations, and QA-ing edge cases so the app does not sound reckless or useless. That is not a two-hour setup task; it is a content design job disguised as logic.</li><li>You are still operating in a trust-sensitive category where being slightly wrong is enough to wreck credibility. Even with softer wording, a bad warning can make the app look alarmist, and a missed warning can make it look incompetent.</li><li>The personalization is weaker than you think. A handful of self-reported logs is not robust pattern detection; it is tiny, noisy anecdote storage. Dressing that up as \"your personal sensitivity record\" risks sounding smarter than the data deserves.</li><li>\"Event type\" may be fake depth. A date, wedding, meeting, or photo day does not change skin chemistry. It only changes user anxiety. If the event field does not materially change recommendations, it is fluff in a lab coat.</li><li>Saveable templates are useful, but they may cannibalize usage instead of increasing it. If users find one safe pre-event routine, they stop needing the checker and just reuse the template.</li><li>The build estimate is optimistic because it treats rule writing, safety copy, taxonomy clarity, and UX onboarding as small tasks. They are not. This app lives or dies on those details because the code is the easy part.</li><li>Local auth/storage in v1 is a smell. For an MVP this small, auth can be overkill and local-only storage can make continuity worse. You have not fully decided whether this is a disposable utility or a long-term tracker, and that muddle will leak into the product.</li><li>The positioning is still shaky. People with real skincare knowledge may find it insultingly obvious, and people without that knowledge may not trust themselves to categorize products correctly. That is a nasty middle zone.</li></ul></div><div class='esect'><div class='esect-label'>Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the software is buildable, but the real work is rule design, taxonomy clarity, safety copy, and validation that users will log enough data for the app to matter twice.</li><li>Biggest solo complexity traps: turning messy real-world products into simple categories without confusing users, writing conflict rules that are helpful but not reckless, overestimating next-day logging compliance, mistaking anecdotal self-reports for meaningful personalization, adding too many screens before proving the core checker is useful, and spending time on auth/templates/history before validating that anyone needs more than a one-time warning.</li></ul></div>"},{"status":"improve","icon":"✨","title":"Improved v3","desc":"Glow Clash should be built as a blunt \"Should I do this routine tonight?\" checker for people who already use strong actives and have an important morning tomorrow.","body":"<div class='esect'><div class='esect-label'>What Changed</div><ul><li>The product is no longer pretending to be a sticky skincare coach. v3 is a narrow pre-event irritation audit: answer a few step-level questions about tonight's routine, get a conservative risk verdict, and see the safest simplified version. This fixes the critique's core problem that v2 was still mostly a rules table plus wishful retention.</li><li>The input model is rebuilt around brutally obvious step cards instead of fuzzy product taxonomy. Users answer yes/no to routine steps such as \"retinoid,\" \"leave-on acid,\" \"benzoyl peroxide,\" \"physical scrub,\" \"new product tonight,\" and \"skin already irritated/dry,\" with examples on each card. If one product contains two harsh actives, they select both. This is better because it removes most categorization ambiguity without needing scanning or ingredient parsing.</li><li>v1 drops fake depth and nonessential systems: no event types, no templates, no auth, no settings sprawl, no \"personal sensitivity history\" moat. Optional next-morning logging stays only as a validation experiment attached to the last check. This makes the build honest, faster, and more credible in a trust-sensitive category.</li></ul></div><div class='esect'><div class='esect-label'>MVP Scope</div><ul><li>What's in v1: landing and trust-setting onboarding, one pre-event check flow, step-card routine input with examples, conservative rules engine with 8-12 manually written rules, results page with plain-language explanations and fallback routine, optional next-morning outcome log tied to the latest check, and lightweight local persistence for the latest checks only</li><li>What's out of v1: scanning, barcode lookup, OCR, ingredient parsing, product search, event-type personalization, templates, auth/accounts, settings page, pattern history claims, push notifications, social features, UGC, moderation, subscriptions, payments, native mobile apps, and any medical-style recommendation engine</li><li>Estimated build time with AI coding tools: 2-4 weeks total, including 4-6 days for rule writing, taxonomy examples, severity definitions, and safety copy; 5-7 days for the web UI and rules logic; 2-3 days for local persistence and integration setup; 1-2 days for the optional next-morning log flow; and 2-3 days for QA on wording, edge cases, and usability</li></ul></div>"},{"status":"critique","icon":"🔍","title":"Critique v3","desc":"This is still dangerously close to being a glorified checklist with attitude.","verdict":"NEEDS MAJOR WORK","verdictClass":"needs","score":"6/10","body":"<div class='esect'><div class='esect-label'>What's Good</div><ul><li>You finally stopped cosplaying as an AI skincare oracle and cut the scanner, OCR, database, auth, and fake personalization bloat. That is the first adult decision this idea has made.</li><li>The scope is now small enough that a solo developer could plausibly ship a working MVP instead of drowning in integrations and taxonomy sludge.</li><li>The input model is less stupid than product parsing. Step cards are a real simplification, even if they are still imperfect.</li><li>The core job is at least understandable now: \"tell me if tonight's routine is reckless before tomorrow matters.\"</li></ul></div><div class='esect'><div class='esect-label'>Brutal Feedback</div><ul><li>This is still dangerously close to being a glorified checklist with attitude. The core value proposition is \"don't combine harsh skincare steps before an important morning.\" That is useful, but it is not remotely novel.</li><li>The biggest problem is unchanged: the app is only as smart as a tiny manual rule table. If the product's brain is 8-12 canned warnings, users may get the same value from a decent TikTok, Reddit post, or dermatologist infographic without needing your app at all.</li><li>Your differentiation is weak because the hard part is not code, it is trust. And right now trust is exactly where the product is vulnerable. If you miss a common irritation combo, you look incompetent. If you over-warn, you look alarmist. In skincare, \"conservative\" can still feel dumb.</li><li>UNVERIFIED: the step-card taxonomy is better than scanning, but it still assumes users know what bucket their routine belongs in. Many do not. A serum with multiple actives, a toner marketed with vague language, or a treatment that straddles categories will make people hesitate. The second they hesitate, your \"simple\" flow stops feeling simple.</li><li>The retention loop is still weak. Why does the user come back after day 1? \"Another important morning someday\" is not a retention engine. It is occasional utility. That can support a tiny tool, but it does not support inflated product ambition.</li><li>Optional next-morning logging is not harmless just because you call it an experiment. It adds another screen, another concept, another piece of copy, and another place for users to ignore you. Most people will not want homework after a night routine. If the logging is low, that whole branch is dead weight.</li><li>The \"importance of avoiding irritation tomorrow\" input smells like fake nuance. Either it changes the recommendation logic, which is risky because user anxiety should not alter skin advice, or it only changes the tone, which means it is ornamental UX fluff.</li><li>The rules are still not actually \"ready.\" They need source selection, wording, severity calibration, contradiction handling, examples, and QA. That is real product labor, not setup polish. Your build estimate is flattering itself by treating content rigor like a side quest.</li><li>The market is awkward. Skincare beginners may not trust themselves to classify products. Skincare enthusiasts may find the advice insultingly obvious. That leaves you fishing for anxious intermediates who use actives, have event-driven panic, and also want a dedicated checker instead of Google. That is a narrower audience than the writeup admits.</li><li>The brand premise still has a trashy undertone. You say you moved away from attractiveness claims, but the original DNA is still \"your face will look worse tomorrow.\" That fear-based framing might get clicks, but it can also make the product feel manipulative and unserious.</li><li>There is no moat, and worse, there may not even be much product. If the best version of this thing is a well-designed one-session checker, fine, but then stop pretending there is a meaningful compounding system here.</li></ul></div><div class='esect'><div class='esect-label'>Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the app shell is easy, but trustworthy rules, crisp taxonomy, and copy that does not sound reckless will eat more time than the code.</li><li>Biggest solo complexity traps: overestimating how obvious the step cards are, underestimating the manual work to define and validate rule copy, shipping fake nuance like \"importance tomorrow,\" keeping the optional logging flow after it proves weak, and mistaking a one-session utility for a real recurring product.</li></ul></div>"},{"status":"validate","icon":"✅","title":"Validated","desc":"Ready for design with a seven-screen handoff and 6/10 critique score.","body":"<div class='esect'><div class='esect-label'>Validation</div><p>Ready for design on 2026-04-02 21:18 with score 6/10.</p></div><div class='esect'><div class='esect-label'>Design Handoff Screens</div><ul><li>Screen 1: Landing / Value Proposition — explains the app as a blunt pre-event irritation checker, shows who it is for, what it does not do, the safety disclaimer, and the CTA to run a check</li><li>Screen 2: Onboarding / How To Use It — teaches the step-card input model with 1-2 concrete examples, explains that users should select every harsh step present even if one product covers multiple categories, and sets expectations around conservative guidance</li><li>Screen 3: Routine Check / Step Cards — main interaction screen with importance selector, step cards for each routine type, short examples under every card, and context toggles for \"new product tonight\" and \"skin already irritated\"</li><li>Screen 4: Results / Risk Verdict — shows risk level, triggered rules, brief reasoning, and the safest simplified routine for tonight; includes actions to edit answers or log outcome tomorrow</li><li>Screen 5: Rule Detail / Why It Was Flagged — expands the triggered rule copy with clearer explanation, what combination caused it, and why the fallback is safer</li><li>Screen 6: Next-Morning Log — optional 10-second follow-up showing the routine summary and asking for redness, stinging, peeling, or no issue, plus an optional note</li><li>Screen 7: Recent Checks — lightweight list of the last few checks and logged outcomes stored on-device, mainly to reopen the most recent check and support the optional follow-up</li></ul></div>"},{"status":"design","icon":"🎨","title":"Designed","desc":"Stitch screens generated and published as a live web prototype.","body":"<div class='esect'><div class='esect-label'>Prototype</div><p>Stitch project created and exported as a clickable GitHub Pages prototype.</p><div class='tag-row'><span class='etag blue'>WEB prototype</span></div></div><div class='esect'><div class='esect-label'>Links</div><p><a class='ext-link' href='https://stitch.withgoogle.com/projects/5640700694548438258' target='_blank' rel='noreferrer'>Open in Stitch</a></p></div>"}]};</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1a;
    color: #f9fafb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .idea-num {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: #3b82f6; background: #1e3a5f;
    padding: 3px 10px; border-radius: 99px;
    flex-shrink: 0;
  }
  .idea-title { font-size: 1.1rem; font-weight: 700; color: #f9fafb; }
  .idea-sub { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    border-radius: 99px; padding: 4px 12px;
    font-size: 0.75rem; color: #9ca3af;
  }
  .score-pill {
    background: #1a2e1a; border: 1px solid #2d4a2d;
    color: #86efac; font-size: 0.75rem; font-weight: 700;
    padding: 4px 12px; border-radius: 99px;
  }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    color: #9ca3af; font-size: 0.75rem;
    padding: 4px 12px; border-radius: 99px;
    cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn:hover { background: #1f2937; color: #f9fafb; border-color: #374151; }

  /* ── Body ────────────────────────────────────────── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
    align-items: stretch;
  }

  /* ── Phone column ────────────────────────────────── */
  .phone-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    gap: 16px;
    background: #0a0f1a;
    overflow: hidden;
  }

  /* MOBILE frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #0f172a,
      0 0 0 11px rgba(255,255,255,0.06),
      0 50px 100px rgba(0,0,0,0.7);
    background: #000;
    flex-shrink: 0;
  }

  /* WEB frame */
  .web-frame {
    width: min(900px, calc(100% - 80px));
    height: min(640px, calc(100vh - 180px));
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.6);
    background: #1f2937;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .web-chrome {
    height: 36px;
    background: #1f2937;
    border-bottom: 1px solid #374151;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .web-chrome .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .web-chrome .dot-r { background: #ef4444; }
  .web-chrome .dot-y { background: #f59e0b; }
  .web-chrome .dot-g { background: #22c55e; }
  .web-chrome .url {
    flex: 1; background: #111827; border-radius: 4px;
    height: 20px; margin: 0 8px;
    display: flex; align-items: center; padding: 0 10px;
    font-size: 0.68rem; color: #6b7280;
  }

  .device-iframe {
    width: 100%; height: 100%;
    border: none; display: block;
    flex: 1;
  }

  /* Switcher */
  .switcher {
    display: flex; gap: 6px;
    flex-wrap: wrap; justify-content: center;
    max-width: 600px;
  }
  .switcher button {
    height: 28px; padding: 0 10px;
    border-radius: 6px; border: 1px solid #1f2937;
    background: #111827; color: #6b7280;
    font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .switcher button:hover { background: #1f2937; color: #d1d5db; border-color: #374151; }
  .switcher button.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }

  /* ── Resize handle ───────────────────────────────── */
  .resize-handle {
    width: 8px;
    flex-shrink: 0;
    cursor: col-resize;
    position: relative;
    background: transparent;
    z-index: 10;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    left: 3px; top: 0; bottom: 0;
    width: 2px;
    background: #1a2235;
    transition: background 0.15s;
  }
  .resize-handle:hover::after { background: #374151; }
  .resize-handle.dragging::after { background: #3b82f6; }

  /* ── Timeline column ─────────────────────────────── */
  .timeline-col {
    width: 460px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    background: #0d1424;
  }
  .timeline-col.collapsed { width: 0; }

  .timeline-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .timeline-header h2 {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #4b5563;
  }

  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 40px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

  /* ── Timeline line + dots ────────────────────────── */
  /* --lx: horizontal center of the line/dots from .timeline-line left edge */
  .timeline-line {
    --lx: 8px;
    position: relative;
    padding-left: 28px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
  }
  .timeline-line::before {
    content: '';
    position: absolute;
    left: calc(var(--lx) - 1px); /* 2px line centered at --lx */
    top: 10px; bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, #1e3a5f 0%, #1f2937 100%);
    border-radius: 2px;
  }

  .entry {
    position: relative;
    margin-bottom: 10px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: -25px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
    top: 18px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1f2937;
    border: 2px solid #374151;
    z-index: 1;
  }
  .entry.s-critique::before { background: #78350f; border-color: #d97706; }
  .entry.s-improve::before  { background: #1e3a5f; border-color: #3b82f6; }
  .entry.s-validate::before { background: #14532d; border-color: #16a34a; }
  .entry.s-design::before   { background: #312e81; border-color: #6366f1; }

  /* ── Entry cards ─────────────────────────────────── */
  .entry-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: #374151; }

  .entry-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer; user-select: none;
  }
  .entry-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 0.85rem; font-weight: 600; color: #f9fafb;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    line-height: 1.3;
  }
  .entry-desc { font-size: 0.72rem; color: #6b7280; margin-top: 3px; }
  .entry-chevron {
    color: #374151; font-size: 0.6rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .entry.open .entry-chevron { transform: rotate(180deg); color: #6b7280; }

  .verdict {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .verdict-needs { background: #451a03; color: #fb923c; }
  .verdict-worth { background: #14532d; color: #86efac; }
  .verdict-kill  { background: #450a0a; color: #f87171; }
  .escore { font-size: 0.7rem; font-weight: 700; color: #60a5fa; }

  .entry-body {
    display: none;
    border-top: 1px solid #1f2937;
    padding: 14px;
    font-size: 0.76rem; color: #9ca3af; line-height: 1.65;
  }
  .entry.open .entry-body { display: block; }

  .esect { margin-top: 10px; }
  .esect:first-child { margin-top: 0; }
  .esect-label {
    font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #4b5563; margin-bottom: 5px;
  }
  .esect ul { padding-left: 14px; }
  .esect li { margin-bottom: 3px; color: #9ca3af; }
  .esect p { color: #9ca3af; }
  .esect strong { color: #d1d5db; font-weight: 600; }
  .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .etag {
    background: #0a0f1a; border: 1px solid #1f2937;
    border-radius: 4px; padding: 2px 7px;
    font-size: 0.66rem; color: #6b7280;
  }
  .etag.green { border-color: #14532d; color: #86efac; }
  .etag.blue  { border-color: #1e3a5f; color: #60a5fa; }
  a.ext-link { color: #818cf8; text-decoration: none; }
  a.ext-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
