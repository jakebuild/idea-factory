<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1a;
    color: #f9fafb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .idea-num {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: #3b82f6; background: #1e3a5f;
    padding: 3px 10px; border-radius: 99px;
    flex-shrink: 0;
  }
  .idea-title { font-size: 1.1rem; font-weight: 700; color: #f9fafb; }
  .idea-sub { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    border-radius: 99px; padding: 4px 12px;
    font-size: 0.75rem; color: #9ca3af;
  }
  .score-pill {
    background: #1a2e1a; border: 1px solid #2d4a2d;
    color: #86efac; font-size: 0.75rem; font-weight: 700;
    padding: 4px 12px; border-radius: 99px;
  }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    color: #9ca3af; font-size: 0.75rem;
    padding: 4px 12px; border-radius: 99px;
    cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn:hover { background: #1f2937; color: #f9fafb; border-color: #374151; }

  /* ── Body ────────────────────────────────────────── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
    align-items: stretch;
  }

  /* ── Phone column ────────────────────────────────── */
  .phone-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    gap: 16px;
    background: #0a0f1a;
    overflow: hidden;
  }

  /* MOBILE frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #0f172a,
      0 0 0 11px rgba(255,255,255,0.06),
      0 50px 100px rgba(0,0,0,0.7);
    background: #000;
    flex-shrink: 0;
  }

  /* WEB frame */
  .web-frame {
    width: min(900px, calc(100% - 80px));
    height: min(640px, calc(100vh - 180px));
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.6);
    background: #1f2937;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .web-chrome {
    height: 36px;
    background: #1f2937;
    border-bottom: 1px solid #374151;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .web-chrome .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .web-chrome .dot-r { background: #ef4444; }
  .web-chrome .dot-y { background: #f59e0b; }
  .web-chrome .dot-g { background: #22c55e; }
  .web-chrome .url {
    flex: 1; background: #111827; border-radius: 4px;
    height: 20px; margin: 0 8px;
    display: flex; align-items: center; padding: 0 10px;
    font-size: 0.68rem; color: #6b7280;
  }

  .device-iframe {
    width: 100%; height: 100%;
    border: none; display: block;
    flex: 1;
  }

  /* Switcher */
  .switcher {
    display: flex; gap: 6px;
    flex-wrap: wrap; justify-content: center;
    max-width: 600px;
  }
  .switcher button {
    height: 28px; padding: 0 10px;
    border-radius: 6px; border: 1px solid #1f2937;
    background: #111827; color: #6b7280;
    font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .switcher button:hover { background: #1f2937; color: #d1d5db; border-color: #374151; }
  .switcher button.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }

  /* ── Resize handle ───────────────────────────────── */
  .resize-handle {
    width: 8px;
    flex-shrink: 0;
    cursor: col-resize;
    position: relative;
    background: transparent;
    z-index: 10;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    left: 3px; top: 0; bottom: 0;
    width: 2px;
    background: #1a2235;
    transition: background 0.15s;
  }
  .resize-handle:hover::after { background: #374151; }
  .resize-handle.dragging::after { background: #3b82f6; }

  /* ── Timeline column ─────────────────────────────── */
  .timeline-col {
    width: 460px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    background: #0d1424;
  }
  .timeline-col.collapsed { width: 0; }

  .timeline-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .timeline-header h2 {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #4b5563;
  }

  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 40px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

  /* ── Timeline line + dots ────────────────────────── */
  /* --lx: horizontal center of the line/dots from .timeline-line left edge */
  .timeline-line {
    --lx: 8px;
    position: relative;
    padding-left: 28px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
  }
  .timeline-line::before {
    content: '';
    position: absolute;
    left: calc(var(--lx) - 1px); /* 2px line centered at --lx */
    top: 10px; bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, #1e3a5f 0%, #1f2937 100%);
    border-radius: 2px;
  }

  .entry {
    position: relative;
    margin-bottom: 10px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: -25px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
    top: 18px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1f2937;
    border: 2px solid #374151;
    z-index: 1;
  }
  .entry.s-critique::before { background: #78350f; border-color: #d97706; }
  .entry.s-improve::before  { background: #1e3a5f; border-color: #3b82f6; }
  .entry.s-validate::before { background: #14532d; border-color: #16a34a; }
  .entry.s-design::before   { background: #312e81; border-color: #6366f1; }

  /* ── Entry cards ─────────────────────────────────── */
  .entry-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: #374151; }

  .entry-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer; user-select: none;
  }
  .entry-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 0.85rem; font-weight: 600; color: #f9fafb;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    line-height: 1.3;
  }
  .entry-desc { font-size: 0.72rem; color: #6b7280; margin-top: 3px; }
  .entry-chevron {
    color: #374151; font-size: 0.6rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .entry.open .entry-chevron { transform: rotate(180deg); color: #6b7280; }

  .verdict {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .verdict-needs { background: #451a03; color: #fb923c; }
  .verdict-worth { background: #14532d; color: #86efac; }
  .verdict-kill  { background: #450a0a; color: #f87171; }
  .escore { font-size: 0.7rem; font-weight: 700; color: #60a5fa; }

  .entry-body {
    display: none;
    border-top: 1px solid #1f2937;
    padding: 14px;
    font-size: 0.76rem; color: #9ca3af; line-height: 1.65;
  }
  .entry.open .entry-body { display: block; }

  .esect { margin-top: 10px; }
  .esect:first-child { margin-top: 0; }
  .esect-label {
    font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #4b5563; margin-bottom: 5px;
  }
  .esect ul { padding-left: 14px; }
  .esect li { margin-bottom: 3px; color: #9ca3af; }
  .esect p { color: #9ca3af; }
  .esect strong { color: #d1d5db; font-weight: 600; }
  .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .etag {
    background: #0a0f1a; border: 1px solid #1f2937;
    border-radius: 4px; padding: 2px 7px;
    font-size: 0.66rem; color: #6b7280;
  }
  .etag.green { border-color: #14532d; color: #86efac; }
  .etag.blue  { border-color: #1e3a5f; color: #60a5fa; }
  a.ext-link { color: #818cf8; text-decoration: none; }
  a.ext-link:hover { text-decoration: underline; }

<script>window.IDEA_DATA = {"ideaNum": 71, "title": "CredentialCliff", "sub": "Keeps a handyman’s current COI ready to resend before jobs.", "score": "5/10", "deviceType": "MOBILE", "stitchId": "13340312488692471267", "startScreen": 1, "screens": [{"id": "ae824104e5234e6d96b6094cb7cb6697", "label": "Landing / wedge-specific pitch"}, {"id": "cb7379668ee04961b16cdb51704dd99f", "label": "Add current COI"}, {"id": "07f0afe4e66c4623bf1b073afe6009a4", "label": "Confirm COI details"}, {"id": "ff032f50d487475a9dddda7b1775ed93", "label": "Save renewal contact"}, {"id": "d4e28f1e563841f89d46be360c5aff8b", "label": "Reminder setup"}, {"id": "d6129a1d44d54fc0bcac585fccc716bd", "label": "Home / status card"}, {"id": "604fff1f77f7490f93aaecf72cd11ae7", "label": "Resend current COI"}, {"id": "1e6ea140978c49bea187e5fe96affa15", "label": "COI detail / edit"}, {"id": "79966068adfc4a5d8d5dc9ea396164a9", "label": "Replace current COI"}, {"id": "5a421092b5e14946a165e540c405930e", "label": "Empty / expired states"}, {"id": "0b88c13ac1af49f49c64829a00b615eb", "label": "Settings / support"}], "timeline": [{"status": "", "icon": "💡", "title": "Original Idea", "desc": "CredentialCliff is a fear-of-loss app that copies the NEXT Insurance model but applies it to licensed workers at risk of losing income from expired credentials.", "verdict": "SUBMITTED", "verdictClass": "worth", "score": "", "body": "<div class=\"esect\"><div class=\"esect-label\">Description</div><p>CredentialCliff is a fear-of-loss app that copies the NEXT Insurance model but applies it to licensed workers at risk of losing income from expired credentials. You scan a permit, license, certification, or insurance document once, and the app extracts the expiration date, renewal steps, and supporting paperwork, then turns it into a blunt income-risk dashboard that shows which upcoming shifts or jobs are exposed. The reveal is immediate and screen-recordable: a red card saying exactly what expires when, how many workdays are at risk, and the first renewal action to take. The loop is scan once, get escalating reminders as the deadline approaches, clear the risk, and come back because most workers juggle multiple credentials with different renewal cycles.</p></div>"}, {"status": "critique", "icon": "🪓", "title": "Critique v1", "desc": "- This pitch is trying to look simple by hiding the hardest parts behind verbs like \"scan,\" \"extract,\" and \"shows.\" Those are not features.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "4/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What Actually Good</div><ul><li>The pain is real. Licensed workers do lose money when credentials lapse, so this is not a fake problem.</li><li>The &quot;red card&quot; concept is strong product theater. A blunt, screen-recordable income-risk warning is clearer than another boring reminder app.</li><li>Reminder-driven products can work when the consequence is concrete and expensive, and &quot;you may lose shifts&quot; is concrete.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>This pitch is trying to look simple by hiding the hardest parts behind verbs like &quot;scan,&quot; &quot;extract,&quot; and &quot;shows.&quot; Those are not features. Those are entire systems.</li><li>The core differentiator is UNVERIFIED. You are assuming a generic scan can reliably extract expiration dates, renewal steps, and supporting paperwork from wildly inconsistent permits, licenses, certifications, and insurance docs. That is fantasy until proven. OCRing a date is one problem. Understanding renewal requirements across states, issuers, and professions is a much uglier problem.</li><li>&quot;Shows which upcoming shifts or jobs are exposed&quot; is another hidden iceberg. Exposed according to what source of truth? Calendar? Employer scheduling software? Gig platform? Manual user input? If there is no real job data, the income-risk dashboard is theater. If there is real job data, now you need integrations, permissions, and trust you have not earned.</li><li>You are bundling at least three products into one: document scanner, compliance knowledge base, and income-risk planner. A solo dev doing vibe coding does not get to casually ship three brittle systems and call it an MVP.</li><li>Renewal steps are not stable. They differ by state, profession, credential issuer, and change over time. So now you either maintain a giant compliance database by hand, scrape a mess of government sites, or hallucinate steps with AI and hope nobody loses income because your app invented a renewal requirement.</li><li>If the app gets one credential wrong, the brand is poisoned. This is not a social toy where users forgive mistakes. If a nurse, electrician, or contractor misses a renewal because your app said the wrong thing, they will not think &quot;beta bug.&quot; They will think your app is dangerous garbage.</li><li>The retention story is thinner than the pitch thinks. &quot;Most workers juggle multiple credentials&quot; is not automatically a habit loop. Why does the user come back after day 1? Most people will scan once, maybe set reminders, then ignore the app until a push notification arrives. That is utility, not engagement.</li><li>The &quot;fear-of-loss&quot; angle cuts both ways. It creates urgency, but it also makes the experience stressful. If every session screams red-card panic, users may avoid opening it the same way people avoid bad financial news.</li><li>The addressable user base is fragmented. Licensed workers are not one market. CNA licenses, real-estate licenses, contractor insurance certs, food-handler permits, and CDL-related docs all have different rules and workflows. &quot;Licensed workers&quot; sounds broad because it is broad. Broad is exactly how a solo builder gets buried.</li><li>The onboarding is likely awful in practice. Users need to find documents, photograph them cleanly, verify extracted details, maybe enter renewal rules manually, maybe connect calendars or work schedules. That is too much setup friction for an app whose promised magic is supposed to feel instant.</li><li>The product is dangerously close to becoming &quot;yet another reminder app plus OCR.&quot; If you cannot prove better-than-reminder-level value immediately, this is a commodity with compliance anxiety layered on top.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Key Questions</div><ul><li>Which single credential category is the wedge, specifically, and why that one?</li><li>What exact source produces renewal steps, and how will you verify they are current and correct?</li><li>What exact source produces &quot;upcoming shifts or jobs at risk,&quot; and what happens when that source is unavailable?</li><li>If extraction confidence is low, what is the fallback experience that still feels useful?</li><li>Why does the user come back after day 1 other than receiving a push notification?</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Suggestions</div><ul><li>Cut the generic &quot;all credentials for all licensed workers&quot; framing. Pick one niche with standardized documents and obvious consequences, like home health aides, real-estate agents, or independent contractors with COI expirations.</li><li>Strip the MVP down to expiration tracking first. Scan document, extract candidate expiration date, force user confirmation, then schedule reminders. Do not pretend you have a compliance brain before you do.</li><li>Remove automated renewal-step extraction unless you have a verified source. A link to the official renewal page is better than AI-generated nonsense.</li><li>Replace &quot;jobs at risk&quot; with a simpler user-entered estimate like &quot;days of work affected&quot; or &quot;weekly income exposed&quot; until you verify a real data source.</li><li>Design for manual correction everywhere. If users cannot easily fix the app&#x27;s guesses, the product will feel incompetent fast.</li><li>Validate demand with one landing page and one profession before building a generalized platform. If one niche does not care enough to upload docs, the broad play dies immediately.</li></ul></div>"}, {"status": "improve", "icon": "🛠️", "title": "Improved Direction", "desc": "CredentialCliff becomes a manual-first COI expiration tracker for independent contractors who cannot afford to show up to a client, site, or onboarding request with expired insurance proof.", "verdict": "NARROWED", "verdictClass": "worth", "score": "", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed and Why</div><ul><li>Narrowed the product from &quot;all credentials for all licensed workers&quot; to one wedge: independent contractors who need an active Certificate of Insurance (COI) on file to keep working. This fixes the fragmentation problem and gives the MVP one document type with a more standardized format instead of an impossible cross-profession compliance product.</li><li>Cut automated renewal-step extraction, supporting-paperwork extraction, and any claim that the app knows upcoming shifts or job risk from external systems. The app now only stores a document, suggests an expiration date when possible, forces user confirmation, and lets the user enter their own weekly income exposure and next booked job date, which removes the biggest trust and integration failures from v1.</li><li>Reframed retention around a weekly &quot;Work Protected?&quot; review instead of passive reminders alone. Users update weekly revenue exposure and next booked job date every week, so the red risk card stays current and gives them a real reason to reopen the app before the deadline panic window.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Improved Description</div><p>CredentialCliff becomes a manual-first COI expiration tracker for independent contractors who cannot afford to show up to a client, site, or onboarding request with expired insurance proof. The user can add one COI by taking a photo or uploading a PDF, but the app treats OCR as optional convenience only. If it can detect an expiration date with reasonable confidence, it prefills a candidate value and immediately asks the user to confirm or correct it. If OCR fails, the user enters the date manually and still gets the full product value.</p><p>The core output is a blunt red card built only from confirmed data: `COI expires in 18 days`, `weekly income exposed: $1,400`, `next booked job: Apr 23`, and `next action: contact insurer / upload renewed COI`. Instead of pretending to know renewal rules, the app asks the user to save one official renewal path: insurer portal URL, broker phone number, or renewal email. That makes the next step fast without inventing compliance advice. The app also stores the current COI file, so when a renewed version arrives the user uploads the replacement and the red card clears immediately.</p><p>Why this is better now: it is no longer three brittle products pretending to be one. It is one narrow utility for one document type, with manual correction everywhere, no external schedule integrations, and no fake compliance intelligence. The value is not &quot;AI knows your renewal requirements.&quot; The value is &quot;I can see exactly when my insurance proof becomes dangerous to my income, and I can fix it fast.&quot;</p><p>Why would users come back in week 2? Because the app asks for a lightweight weekly review every Friday: confirm the next booked job date and this week&#x27;s revenue at risk. For independent contractors, client work and exposure change week to week. That review keeps the red card accurate, and uploading a renewed COI is a clear completion moment that closes the loop.</p><p>Three biggest assumptions that could kill this:\n- Contractors who rely on COIs will complete manual setup and maintain one weekly revenue-at-risk number because the red card is useful enough on day 1. `UNVERIFIED`\n- COI documents are consistent enough that OCR can reduce setup time, even though manual entry remains the fallback. `UNVERIFIED`\n- A weekly exposure review is enough to create week-2 retention beyond push notifications. `UNVERIFIED`</p><p>False assumption removed from v1:\n- &quot;A generic scan can reliably extract renewal steps and supporting paperwork across permits, licenses, certifications, and insurance docs.&quot; `FALSE`</p><p>Fallback plan for the unverified pieces: do not position OCR or weekly habit strength as the moat. If OCR is weak, ship manual entry plus file storage. If the weekly review does not stick, reposition the product as a low-frequency deadline utility and test whether users still convert on the strength of the red card plus reminders before expanding scope.</p></div><div class=\"esect\"><div class=\"esect-label\">Open Questions</div><ul><li>Which contractor wedge should launch first inside the broader COI category: cleaners, handymen, photographers, or another group with frequent proof-of-insurance requests?</li><li>Is a user-saved insurer portal / broker contact enough as the renewal path, or do early testers still expect more guided renewal help?</li><li>Does the weekly &quot;Work Protected?&quot; review produce real week-2 retention, or is this ultimately a low-frequency reminder utility with weaker monetization?</li><li>Is OCR good enough on typical ACORD/COI documents to keep in v1 onboarding, or should manual entry be the default and OCR deferred?</li><li>Should the MVP be mobile web first for faster shipping, or native mobile first because document capture and reminders are the real product?</li></ul></div>"}, {"status": "validate", "icon": "🧪", "title": "Critique v2", "desc": "- You did not invent a market category here.", "verdict": "WORTH BUILDING", "verdictClass": "worth", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What Actually Good</div><ul><li>This is dramatically less stupid than v1. Narrowing from &quot;all credentials for all licensed workers&quot; to one document type finally gives the product a shape.</li><li>Manual-first confirmation is the right move. You stopped pretending OCR is magic and moved the trust boundary back onto user-confirmed data.</li><li>The red risk card is still the strongest part of the concept. &quot;Your COI expires in 18 days and $1,400 this week is exposed&quot; is blunt, legible, and emotionally effective.</li><li>Saving the renewal path is smart because it turns panic into action instead of fake compliance intelligence.</li><li>This is close enough to a real solo-buildable utility that a single developer could actually test demand instead of drowning in platform fantasies.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>You did not invent a market category here. You built a sharper reminder app for one annoying document. That can still work, but stop dressing it up like a new operating system for contractor risk.</li><li>The retention story is still shaky and still UNVERIFIED. A weekly &quot;Work Protected?&quot; review sounds tidy in a product doc, but in real life it is one more chore for people already juggling jobs, invoices, and client bullshit. Why does the user come back after day 1? Because you nag them. That is not a moat. That is a notification schedule.</li><li>The product depends on users doing manual upkeep on the two most perishable fields in the app: weekly income exposure and next booked job date. Those numbers drift constantly. The second they go stale, the red card becomes fake precision theater.</li><li>You cut the impossible compliance brain, which was good, but now the value proposition is thinner than you want to admit. &quot;Store a COI, track expiry, keep a broker link, send reminders&quot; is useful, but it is also brutally easy to replicate and painfully hard to charge much for.</li><li>You are still hiding fragmentation inside the phrase &quot;independent contractors.&quot; A cleaner, handyman, photographer, DJ, and field inspector do not buy software the same way, discover products the same way, or feel COI urgency with the same frequency. If you cannot name the first wedge precisely, your marketing is still mush.</li><li>The onboarding burden is not solved. The user still has to find a COI, upload it, verify dates, enter weekly income exposure, enter next booked job, add a renewal path, and configure reminders before they feel the payoff. For a product whose whole pitch is &quot;don&#x27;t lose work,&quot; that setup is longer than it should be.</li><li>OCR is correctly demoted to convenience, but it is still UNVERIFIED. If the OCR prefill is wrong often enough, it does not save setup time; it adds a trust tax because users now have to audit the machine before trusting the app.</li><li>The archive/history idea is fluff unless users actually need records for disputes or audits. Most people do not want a museum of old COIs. They want the current one not to screw them.</li><li>Reminder delivery is being treated like a solved problem when it absolutely is not. Mobile web reminder reliability is mediocre, email gets ignored, push requires app install and permissions, and SMS costs money. For this kind of product, reminder failure is not a minor bug. It is the product failing at the only job the user hired it to do.</li><li>Monetization is awkward. Users who only need this a few times a year will resist a subscription, and a one-time purchase makes reminder infrastructure and support economics uglier. If the business model is &quot;maybe contractors are anxious enough to pay anyway,&quot; that is not a business model.</li><li>There is a decent chance the real best version of this is not a standalone app at all. It may be a tiny mobile-first utility, a WhatsApp/SMS concierge, or a feature inside a broader contractor admin tool. Standalone only works if the pain is both frequent and sharp enough to earn a home-screen slot.</li><li>Your estimate still reads like happy-path math. The screens are easy. The annoying parts are reminder reliability, file handling edge cases, document replacement flows, permission friction, offline capture weirdness, and writing copy honest enough that users do not assume you give legal/compliance advice.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Key Questions</div><ul><li>Which exact contractor wedge launches first: cleaners, handymen, photographers, notaries, inspectors, or someone else? &quot;Independent contractors&quot; is not a wedge.</li><li>Why does the user come back after day 1 if their COI is not close to expiring and no job is at immediate risk?</li><li>What happens when the user ignores the weekly review for three weeks and the red card is built on stale income/job inputs?</li><li>What reminder channel is the real MVP: native push, email, SMS, or calendar export? Pick one and be honest about its failure modes.</li><li>Is the first paid offer a cheap annual utility, a per-document fee, or a free tool to validate demand? If you do not know, you do not know whether this is a product or a feature.</li><li>Do users actually care about upload history, or are you adding recordkeeping because the core product feels too thin?</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Suggestions</div><ul><li>Narrow again. Pick one contractor type with frequent proof-of-insurance requests and ugly consequences for showing up with stale paperwork.</li><li>Treat the weekly review as an experiment, not as the retention thesis. If users will not maintain the risk inputs, default the product back to expiry tracking and reminder execution.</li><li>Make manual entry the true default and keep OCR behind a soft convenience layer until document accuracy is proven on real samples.</li><li>Cut history from MVP unless interviews show a real recordkeeping need. Current document, confirmed expiration, renewal path, and reminder control are enough.</li><li>Decide the platform based on reminder reliability, not developer comfort. If mobile web cannot do the job dependably, stop pretending speed-to-ship makes it the right choice.</li><li>Validate willingness to pay before polishing the vault. If nobody will pay for &quot;don&#x27;t forget your COI,&quot; the product is a nice utility, not a business.</li></ul></div>"}, {"status": "improve", "icon": "🔧", "title": "Improved Wedge", "desc": "CredentialCliff becomes a mobile-first COI readiness utility for solo handymen who work with property managers and get asked, over and over, to send current proof of insurance before a job, vendor setup, or site approval", "verdict": "REFINED", "verdictClass": "worth", "score": "", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed and Why</div><ul><li>Narrowed the wedge from generic &quot;independent contractors&quot; to handymen who subcontract for small property managers. This fixes the biggest market-shape problem: these users get repeated COI requests, face immediate work stoppage if their proof is stale, and can be reached with a much clearer message than a broad contractor bucket.</li><li>Removed the two structurally bad inputs from v2: weekly income exposure and next booked job date. They drift too fast, make the red card dishonest, and create setup friction before value. The app now shows only confirmed status data: current COI, expiration date, renewal contact, and whether the document is ready to resend.</li><li>Cut OCR, weekly review, and history from MVP. Manual entry is the default, because it is faster to ship, easier to trust, and avoids building the product around unverified convenience features. In their place, v1 adds one stronger repeat job: when a property manager asks for proof of insurance, the user can open the app and resend the current COI in seconds.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Improved Description</div><p>CredentialCliff becomes a mobile-first COI readiness utility for solo handymen who work with property managers and get asked, over and over, to send current proof of insurance before a job, vendor setup, or site approval. The product is not pitched as a new contractor operating system. It does one job: keep the latest COI easy to resend and hard to let expire.</p><p>The setup is deliberately short. The user uploads their current COI, manually confirms the expiration date, saves a broker or insurer contact, and generates renewal reminders through a calendar export flow. The home screen then shows a blunt status card: `Active until May 28`, `Expires in 20 days`, `Broker: Sam at ABC Insurance`, and `Send current COI`. No weekly income math. No next-job prediction. No fake compliance intelligence.</p><p>The repeat use case is practical, not aspirational. When a property manager texts, emails, or calls asking for an updated COI, the user opens the app, sees whether the document is current, and resends the latest file immediately. That is the week-2 return reason. Renewal reminders matter, but they are not the retention thesis by themselves. The product is useful in the middle of active work, not only near the expiration date.</p><p>The red/yellow status card stays because it is the strongest piece of the concept, but it is now tied only to stable facts the app can actually know: current document on file, confirmed expiration date, and renewal contact path. That makes the warning credible instead of theatrical.</p><p>The initial distribution wedge is specific: handymen who subcontract for small property managers. If early testing shows that this segment does not reopen the app to resend COIs, the fallback is not to widen the audience. The fallback is to reduce the product further into a lightweight send-and-remind utility and test it as a feature, not a standalone business.</p><p>Three biggest assumptions that could kill the product:\n- Handymen working with property managers are asked to resend COIs often enough that &quot;current COI ready to send&quot; creates repeat usage beyond renewal season. `UNVERIFIED`\n- Manual setup stays low-friction enough when it is only upload + expiration date + broker contact + reminder export. `VERIFIED`\n- OCR meaningfully reduces setup time for COIs. `FALSE`</p><p>Fallback plan for the unverified differentiator:\n- Do not present repeat resend behavior as a moat. It is an open risk. If users only care near expiration, reposition the product as a low-frequency renewal utility or bundle the feature into a broader contractor admin workflow later.</p><p>Why would users come back in week 2?\n- Because the product doubles as the fastest place to check &quot;is my COI current?&quot; and resend it when a property manager asks for proof before a job. If that behavior does not appear in testing, confidence in the standalone app drops sharply.</p></div><div class=\"esect\"><div class=\"esect-label\">Solo MVP Scope</div><ul><li>What&#x27;s in v1: one user type only (solo handymen subcontracting for property managers), one document type only (current COI), manual upload plus manual expiration-date confirmation, broker/insurer contact storage, status card, resend/share flow for the latest COI, replace-current-COI flow, calendar-based reminder export, and plain-language boundary copy saying the app does not provide legal or compliance advice.</li><li>What&#x27;s out of v1: all non-COI credentials, all other contractor categories, weekly income exposure, next booked job date, weekly review prompts, OCR, archive/history, compliance-rule databases, renewal-step generation, employer or platform integrations, push notification systems, SMS, marketplace features, payments, payouts, user-generated content, moderation, team accounts, and any feature that depends on users returning to contribute data.</li><li>Estimated build time with AI coding tools: 2.5-3.5 weeks total, including 5-7 days for UI and core flows, 2-3 days for secure file upload/storage and replacement handling, 2 days for share/resend and calendar export integration setup, 2-3 days for empty states, reminder copy, legal-boundary copy, and onboarding content prep, and 3-4 days for mobile QA, file edge cases, permission friction, and deployment cleanup. This estimate includes UI build, integration setup, and the manual content-prep work for reminder text, help copy, and property-manager-focused onboarding.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Open Questions</div><ul><li>Do handymen serving small property managers actually get enough repeated COI requests to justify a dedicated tool, or is this really just a reminder feature inside a broader admin app?</li><li>Is calendar export enough as the MVP reminder channel, or do testers treat it as too manual compared with native push?</li><li>Will users trust a dedicated resend flow more than just keeping the PDF in email or phone files?</li><li>Is the first test best run as a free utility to validate repeat use, or as a cheap annual product once reminder reliability is proven?</li></ul></div>"}, {"status": "critique", "icon": "⚠️", "title": "Critique v3", "desc": "- This is still one small feature pretending to be a company.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "5/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What Actually Good</div><ul><li>You finally stopped pretending this is a compliance brain and cut it down to one narrow job with one document. That is the first remotely adult decision this idea has made.</li><li>The handymen-for-property-managers wedge is better than the old &quot;independent contractors&quot; mush. At least now there is a buyer context, a repeated request pattern, and a specific pain event.</li><li>Cutting OCR, fake income math, and weekly review from MVP was correct. Those features were bloat wearing a productivity costume.</li><li>&quot;Current COI ready to resend&quot; is the only part that sounds like a real week-2 use case instead of a self-congratulatory reminder app.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>This is still one small feature pretending to be a company. Strip away the framing and you have &quot;store one PDF, show expiry, and re-share it fast.&quot; Useful? Maybe. Defensible business? Not remotely proven.</li><li>Your entire standalone case hangs on one `UNVERIFIED` assumption: handymen get asked for COIs often enough that a dedicated app earns a place on their phone. If that is false, the whole product collapses into a low-frequency reminder utility people open twice a year.</li><li>The resend flow is not automatically better than the status quo. The real incumbents are phone files, email search, iCloud Drive, Google Drive, Dropbox, and &quot;text my broker.&quot; You are not competing against nothing. You are competing against habits that are already installed and free.</li><li>Manual setup is &quot;verified&quot; only in the weak sense that it is possible, not that people will happily do it for a single-document utility. Upload file, confirm date, add broker contact, export reminders, trust the app, remember the app exists: that is still a lot of ceremony for something users currently solve with a folder and a calendar event.</li><li>Calendar export is a cop-out masquerading as scope discipline. It removes engineering work from your side by dumping reminder reliability onto the user. If the reminder fails because they never added it, dismissed it, or changed phones, they will blame the product anyway.</li><li>The retention story is still fragile. Why does the user come back after day 1? Because a property manager asks again. How often is that really happening for this exact wedge? If the answer is &quot;not much,&quot; then this is not a product loop. It is an occasional document retrieval moment.</li><li>There is no real moat here. Any generic document wallet, insurer portal, broker portal, contractor admin app, or even a better file-sharing shortcut can clone this in a weekend. Being narrow helps messaging, but it also makes your ceiling tiny unless the pain is brutal and frequent.</li><li>The wedge is narrower, but distribution is still hand-wavy. How exactly does a solo developer cheaply reach &quot;handymen who subcontract for small property managers&quot; at volume? This is not a clean self-serve SaaS audience sitting on Product Hunt waiting to buy a COI utility.</li><li>You are underselling the boring ugly parts. Secure file storage, share flows, mobile permissions, replacing the current document cleanly, handling photos versus PDFs, and making the latest file obvious are all solvable, but they are exactly the kind of annoying edge-case swamp that eats a solo builder&#x27;s two-week estimate.</li><li>The product risks being too low-stakes in daily behavior and too high-stakes in expectations. Users will not engage often enough to love it, but when they do use it they will expect it not to fail. That is a bad combo for a tiny standalone app.</li><li>The monetization story still stinks. Subscription pricing is absurd for a low-frequency utility, one-time pricing is weak for ongoing support/storage, and free makes it a feature test, not a business. If the best business model is &quot;maybe sell later once trust exists,&quot; you do not have a business yet.</li><li>Your own fallback admits the truth: if repeat resend behavior is weak, this should shrink into a feature or utility, not remain a standalone company. That is not a reassuring fallback. That is the likely outcome already peeking through the floorboards.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Key Questions</div><ul><li>Why does the user come back after day 1, specifically for this handyman/property-manager wedge, and how often does that happen in reality rather than in theory?</li><li>What is meaningfully faster in this app than opening phone files, email search, or cloud storage and sending the same PDF from there?</li><li>How will a solo builder acquire the first 50 real users in this wedge without burning months on offline hustle and bespoke onboarding?</li><li>Is calendar export actually good enough, or is it just the cheapest possible reminder implementation dressed up as intentional MVP scope?</li><li>If users only care near renewal time, why is this a standalone app instead of a tiny feature inside broader contractor admin software?</li><li>What evidence says users will trust this tool more than the systems they already use to store and send insurance documents?</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Suggestions</div><ul><li>Treat this as a demand test for a utility, not as a startup with product-market fit already implied. The current concept has not earned that framing.</li><li>Run the ugliest possible smoke test before building much: landing page, mock status card, fake resend promise, and interviews with real handymen who work with property managers. If repeated resend demand is weak, stop.</li><li>Cut &quot;app&quot; ego wherever possible. A dead-simple mobile web utility or even a broker-assisted workflow may teach you more than polishing a standalone product shell.</li><li>Validate the incumbent comparison head-on. If users say &quot;I already keep the PDF in my email and that is fine,&quot; this idea is not differentiated enough.</li><li>Do not spend time on premium-feeling UX until you know the resend flow beats existing behavior in speed and trust.</li><li>Be honest that the best first outcome may be learning this belongs inside a bigger contractor admin product, not proving a standalone business.</li></ul></div>"}, {"status": "design", "icon": "🎨", "title": "Design Created", "desc": "Stitch generated 11 mobile screens and the preview bundle was wired into a clickable prototype.", "verdict": "READY", "verdictClass": "worth", "score": "5/10", "body": "<div class=\"esect\"><div class=\"esect-label\">Preview</div><p>Device: MOBILE. Stitch project: 13340312488692471267.</p></div><div class=\"esect\"><div class=\"esect-label\">Screens</div><ul><li>Landing / wedge-specific pitch</li><li>Add current COI</li><li>Confirm COI details</li><li>Save renewal contact</li><li>Reminder setup</li><li>Home / status card</li><li>Resend current COI</li><li>COI detail / edit</li><li>Replace current COI</li><li>Empty / expired states</li><li>Settings / support</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Artifacts</div><div class=\"tag-row\"><span class=\"etag blue\">status: designing</span><span class=\"etag green\">score: 5/10</span></div></div>"}]};</script>

<body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
