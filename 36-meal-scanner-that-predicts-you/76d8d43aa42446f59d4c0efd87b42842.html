function selectEnergy(el, rating) {
  document.querySelectorAll('[data-rating]').forEach((btn) => {
    btn.classList.remove('bg-primary-container','text-on-primary-container','border-primary');
    btn.classList.add('bg-surface-container-lowest');
  });
  el.classList.add('bg-primary-container','text-on-primary-container','border-primary');
  el.classList.remove('bg-surface-container-lowest');
  const save = document.getElementById('energy-save');
  if (save) {
    save.disabled = false;
    save.classList.remove('opacity-50');
  }
}
