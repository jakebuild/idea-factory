function selectMeal(el, message) {
  document.querySelectorAll('section button').forEach((btn) => {
    btn.classList.remove('bg-primary-container','text-on-primary-container','border-primary');
    btn.classList.add('bg-surface-container-lowest','text-on-surface');
  });
  el.classList.add('bg-primary-container','text-on-primary-container','border-primary');
  el.classList.remove('bg-surface-container-lowest','text-on-surface');
  const callout = document.getElementById('history-callout');
  if (callout) {
    if (message) {
      callout.style.display = '';
      const textNode = callout.querySelector('p,span,div') || callout;
      textNode.textContent = message;
    } else {
      callout.style.display = 'none';
    }
  }
  const submit = document.getElementById('log-submit');
  if (submit) {
    submit.disabled = false;
    submit.classList.remove('opacity-50');
  }
}
