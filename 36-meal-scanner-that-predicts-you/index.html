port a trustworthy crash forecast, slump window, or step target.</li><li>The app was drifting into fake health authority and cold-start homework.</li><li>Food image recognition and exact timing claims would collapse in messy real-world use.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev Check</div><p>Possible only if reduced to a much simpler feedback loop and stripped of fake precision.</p></div>"}, {"status": "improve", "icon": "✨", "title": "Improved v2", "desc": "The concept shifted from pseudo-prediction to a meal-plus-check-in habit loop.", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Dropped exact slump windows and step targets.</li><li>Made the 90-minute check-in the core loop instead of a side effect.</li><li>Limited early output to honest heuristics and delayed personal claims until enough data exists.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">MVP Scope</div><ul><li>Photo capture and rough meal categorization.</li><li>90-minute reminder with a 1–5 energy rating.</li><li>Log history and an unlockable pattern summary after repeated check-ins.</li></ul></div>"}, {"status": "critique", "icon": "🔍", "title": "Critique v2", "desc": "The core loop got sharper, but the camera still looked like expensive UX theater.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What's Good</div><ul><li>The idea stopped pretending to be precise science.</li><li>The MVP became closer to something one developer could actually ship.</li><li>The most compelling question became the personal lunch-energy loop.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>Day-1 value was still weak and the first result felt generic.</li><li>The camera was theatrical because the real loop was category, reminder, rating, correlation.</li><li>Five check-ins and one reminder were still too flimsy to feel meaningful or sticky.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev Check</div><p>Still viable only if the product stops worshipping the scanner, uses boring notifications, and treats the first release as a behavior experiment.</p></div>"}, {"status": "improve", "icon": "✨", "title": "Improved v3", "desc": "The scanner became a lunch-only experiment with manual tags, a pre-log history flag, and a stronger unlock threshold.", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Replaced camera classification with eight manual lunch tags.</li><li>Added a pre-log history flag grounded in the user’s own prior check-ins.</li><li>Delayed pattern unlock to eight completed check-ins and added one suggested next step.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">MVP Scope</div><ul><li>Lunch-only onboarding and lunch window setup.</li><li>Manual meal tag picker with optional photo and note.</li><li>Push check-in, reverse-chronological history, and ranked lunch patterns after eight check-ins.</li></ul></div>"}, {"status": "validate", "icon": "✅", "title": "Validated", "desc": "The idea was advanced to design with a tighter MVP and a defined screen set.", "body": "<div class=\"esect\"><div class=\"esect-label\">Validation</div><div class=\"tag-row\"><span class=\"etag\">Score: 6/10</span><span class=\"etag\">Validated: 2026-04-01 12:24</span></div></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff</div><ul><li>Onboarding step 1 and step 2.</li><li>Home, Log Meal, Logged Confirmation, and Check-in Prompt.</li><li>Log Detail, Log History, Patterns locked, and Patterns unlocked.</li></ul></div>"}, {"status": "design", "icon": "🎨", "title": "Designed", "desc": "The Stitch prototype was generated and packaged as a single clickable mobile preview.", "body": "<div class=\"esect\"><div class=\"esect-label\">Design Output</div><div class=\"tag-row\"><span class=\"etag\">Device: MOBILE</sp <body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
