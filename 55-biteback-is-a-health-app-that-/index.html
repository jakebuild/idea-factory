    flex: 1;
    min-width: 0;

    flex-direction: column;

    width: min(900px, calc(100% - 80px));

    border-radius: 10px;
    overflow: hidden;
    box-shadow:

  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 0.85rem; font-weight: 600; color: #f9fafb;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;

      "body": "<div class=\"esect\"><div class=\"esect-label\">Description</div><ul><li>BiteBack is a health app that copies the Cal AI model but applies it to dental anxiety instead of calories. You scan the dessert, soda, sports drink, or late-night snack you are about to have, tell the app roughly when you will brush, and it calculates a Tooth Damage Window based on sugar, acidity, stickiness, and timing. The reveal is instant and screen-recordable: a blunt warning that says your teeth stay in cavity-risk mode until a specific time tonight, plus the exact safe-brush time and one lower-damage swap so the loop becomes scan, see the damage, swap or delay, and come back because the same nighttime choices keep repeating.</li></ul></div>"

      "desc": "The fake precision and fear-based hook were the biggest credibility problems.",
      "body": "<div class=\"tag-row\"><span class=\"etag\">NEEDS MAJOR WORK</span><span class=\"etag\">5/10</span></div><div class=\"esect\"><div class=\"esect-label\">What&#x27;s Good</div><ul><li>The core hook is strong and legible: &quot;scan snack, see exact damage window, know when it&#x27;s safer to brush&quot; is more concrete than generic dental advice.</li><li>It targets a real repeated behavior cluster: late-night sugar, soda, and lazy brushing decisions are common, emotionally loaded, and easy to understand.</li><li>The screen-recordable reveal gives it some viral potential because the output is blunt, visual, and easy to share.</li><li>A narrowly scoped MVP is possible if you stop pretending this is clinical intelligence and treat it as a heuristic risk meter.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>This is dental anxiety bait dressed up as science. &quot;Tooth Damage Window&quot; sounds authoritative, but unless you have a defensible model, it is just fear-based UX with a timer.</li><li>The main promise depends on false precision. You are implying the app can tell me an exact safe-brush time from a photo, rough brushing estimate, sugar, acidity, and stickiness. That is not how mouths work. Saliva flow, portion size, existing enamel damage, fluoride use, eating speed, and whether the user rinsed matter too. Your &quot;specific time tonight&quot; risks being confidently wrong.</li><li>You are stacking uncertainty on uncertainty. First the app has to identify the food or drink correctly. Then it has to estimate sugar/acidity/stickiness. Then it has to map that to cavity-risk timing. Then it has to tell the user what to do. Every layer compounds bullshit.</li><li>&quot;Copies the Cal AI model&quot; is not a strategy; it is cargo cult product design. Calorie apps work because users already accept rough nutritional estimates. Dental risk is less intuitive, less frequently tracked, and much harder to verify from daily feedback.</li><li>The retention loop is weak. Why does the user come back after day 1? Because they keep making bad nighttime choices? That is not a product loop; that is a hope that the user stays unhealthy enough to need you.</li><li>The product may be too negative to live with. A calorie app can feel empowering. A dental-anxiety app that scolds people before dessert can feel punishing, neurotic, and easy to uninstall.</li><li>The &quot;one lower-damage swap&quot; sounds simple until you try to make it useful. Swap to what: cheese, nuts, water, xylitol gum, a different dessert? Good suggestions require context, and bad suggestions make the app feel stupid instantly.</li><li>The scan step is friction masquerading as magic. Most people know soda and sticky candy are bad for teeth. If the app tells them what they already know, it is dead. If it tries to be smarter than common sense, it will often be wrong.</li><li>You are drifting into health advice territory without the credibility to support it. If your timer tells someone to delay brushing and they interpret that badly, you now own the trust problem even if your disclaimer screams otherwise.</li><li>The idea is not naturally habit-forming because the payoff is delayed and invisible. People do not feel enamel erosion in real time. Without immediate reward, the app becomes a guilt notification machine.</li><li>The market is niche inside a niche. You need users who both care enough about dental health to scan snacks and are not already solving this with &quot;don&#x27;t drink soda before bed.&quot;</li><li>If the value depends on high-quality food recognition and nutrient/acidity mapping, your supposedly simple app quietly becomes a data product. That is exactly the kind of hidden scope that burns solo builders.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — only if the MVP is brutally reduced to a heuristic risk checker with a tiny item database, manual input fallback, and zero claims of medical-grade accuracy.</li><li>Biggest solo complexity traps: camera-based food recognition quality; building or sourcing reliable sugar/acidity/stickiness data; inventing a defensible risk formula; handling health-adjacent liability and disclaimers; creating actually useful swap suggestions; retention mechanics that are not just shame loops.</li></ul></div>",

u are not giving dumb advice. That is manual product work, not free scope.</li><li>The rule engine is still health-adjacent enough to create trust problems. &quot;Wait a bit before brushing after an acidic drink&quot; is reasonable-sounding, but the second users sense hand-wavy advice on something medical-ish, trust drops fast. Disclaimers do not make bad heuristics feel credible.</li><li>The emotional tone is still dangerous. You say this is not guilt-based, but the core loop is literally &quot;confess snack, receive risk label.&quot; A lot of people will interpret that as scolding with a pastel UI.</li><li>The pattern view is not a moat; it is a chart. &quot;3 of your last 5 high-risk nights came from soda after 9:30 PM&quot; is useful exactly once. After that, the user has learned the lesson. Repeating the obvious is not retention, it is a reminder that the app has no second act.</li><li>The app may be too narrow to matter and too naggy to love. Dental self-care is important, but it is not a category people romanticize, obsess over, or talk about daily unless they already have a problem. That is a weak base for habit-product ambition.</li><li>The fallback positioning exposes the weakness. If retention fails, you reposition it as a lightweight educational utility. That is another way of saying &quot;if the habit app does not work, maybe this is just a one-off tool.&quot; Exactly. That is the real risk.</li><li>The build estimate is still optimistic. &quot;4-5 days for content prep and rule writing&quot; sounds like someone who has never had to turn messy health-adjacent advice into consistent, non-annoying consumer copy. The content is the product here. Treating it like a side task is self-deception.</li><li>Notifications are not automatically a feature. A bedtime reminder to log risky snacks can easily become an instant mute or uninstall trigger, especially if the user is already tired, guilty, or annoyed.</li><li>There is still no obvious wedge for distribution.       "desc": "The v3 handoff is specific enough to generate a design-ready prototype.",
      "body": "<div class=\"esect\"><div class=\"esect-label\">Validation</div><ul><li>Score: 7/10</li><li>Status: status: ready-for-design\nvalidated_at: 2026-04-03 02:47\nscore: 7/10</li><li>Date: 2026-04-03</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff</div><ul><li>Screen 1: Landing / Value Prop — explains the 14-night reset in one sentence; key elements: headline, who it is for, three-step explanation, start CTA, trust disclaimer link.</li><li>Screen 2: Choose Your Habit — lets the user pick one main culprit category; key elements: 5-7 category cards, short examples for each, &quot;this is the one I want to cut&quot; CTA.</li><li>Screen 3: Build My Plan — sets the initial reset plan; key elements: chosen habit summary, cutoff selector, two fallback options, short note explaining the plan is editable after slips.</li><li>Screen 4: Nightly Check-In — core daily screen; key elements: three large actions (`I&#x27;m about to have it`, `I already had it`, `I skipped it tonight`), current day of 14, current plan summary.</li><li>Screen 5: Rescue / Recovery Card — shows the concrete next step for tonight; key elements: one recommended action, one avoid-this warning, one reset instruction for later tonight, save CTA.</li><li>Screen 6: Night Logged — confirms the entry was saved; key elements: tonight&#x27;s outcome, current progress through the 14 nights, next check-in CTA, optional view history link.</li><li>Screen 7: Plan Adjustment — appears only after repeated slips; key elements: what keeps happening, one recommended plan change, accept/change-later actions.</li><li>Screen 8: Reset Progress / History — shows the current 14-night run; key elements: calendar/list of outcomes, current plan, accepted adjustments, restart reset CTA.</li><li>Screen 9: Method / Trust — explains the rule-based nature of the advice; key elements: what the app can and cannot tell you, non-medical framing, contact/support info.</li></ul></div>"
    },
    {
      "status": "design",
      "icon": "🎨",
      "title": "Designed",
      "desc": "Stitch project and preview assets were generated for the mobile prototype.",
      "body": "<div class=\"esect\"><div class=\"esect-label\">Design Output</div><ul><li><a class=\"ext-link\" href=\"https://stitch.withgoogle.com/projects/13808771399622021930\">Open Stitch project</a></li><li>Device type: MOBILE</li><li><a class=\"ext-link\" href=\"https://jakebuild.github.io/idea-factory/55-biteback-is-a-health-app-that-/\">Open live preview</a></li></ul></div>"
    }
  ]
};
</script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
