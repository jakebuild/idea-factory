<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MoodDot — Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111827;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px 16px 40px;
  }
  .label {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 6px;
    text-align: center;
  }
  .title {
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    background: #fff;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.1);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .phone-frame iframe {
    border: none;
    display: block;
    width: 100%;
    height: 100%;
  }
  .switcher {
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 420px;
  }
  .switcher button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .switcher button:hover { background: rgba(255,255,255,0.3); }
  .switcher button.active { background: #7C4DFF; }
</style>
</head>
<body>
<div class="label">📱 Mobile Prototype</div>
<div class="title">MoodDot — Daily Mood + Context Tracker</div>
<div class="phone-frame">
  <iframe id="app" src="58b917d03e334b8d9a07114317e7b035.html"></iframe>
</div>
<div class="switcher">
  <button onclick="setScreen(0)" title="Widget">1</button>
  <button onclick="setScreen(1)" class="active" title="Home">2</button>
  <button onclick="setScreen(2)" title="Log Detail">3</button>
  <button onclick="setScreen(3)" title="Pattern View">4</button>
  <button onclick="setScreen(4)" title="Calendar">5</button>
  <button onclick="setScreen(5)" title="Settings">6</button>
</div>
<script>
  var screens = [
    "c9ffff6ca10f40ba9430a7633eede0f3.html",
    "58b917d03e334b8d9a07114317e7b035.html",
    "0072f10ebaa8407c83dce7142eba381a.html",
    "6754a8cb41ed4127944e8135a2caf3ac.html",
    "5c4c81dd9ebd48fb81f416ee5d7abbef.html",
    "7c5cce8e4f2a4fbe877f2976eebe329e.html"
  ];
  var labels = ["Widget","Home","Log Detail","Patterns","Calendar","Settings"];
  var btns = document.querySelectorAll('.switcher button');

  function setScreen(i) {
    document.getElementById('app').src = screens[i];
    btns.forEach(function(b,j){ b.classList.toggle('active', i===j); });
  }
</script>
</body>
</html>
