      "score": "3/10",
      "body": "<div class=\"esect\"><div class=\"esect-label\">What&apos;s Good</div><ul><li>The pitch is instantly understandable in one line, which is rare and useful.</li><li>A solo dev can technically ship a barebones daily-reading app fast if the scope is brutally cut.</li><li>Habit mechanics from Duolingo can be reused conceptually without inventing a completely new user behavior.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>This is barely an idea. &quot;Duolingo for Reading&quot; is branding cosplay, not a product spec. Duolingo works because it has tight exercises, progression, streak psychology, content scaffolding, and clear skill gains. &quot;Book summaries daily&quot; has none of that by default.</li><li>The core value proposition is weak. People who want book summaries already have Blinkist, Shortform, YouTube, podcasts, newsletters, and an endless pile of free AI-generated summaries. Why does this deserve to exist?</li><li>The differentiator is fake. Saying &quot;Duolingo for X&quot; usually means &quot;we copied streaks and circles and hoped addiction equals value.&quot; If all you have is summaries plus gamification, that is not product innovation. That is a coat of paint on commodity content.</li><li>Retention is unanswered. Why does the user come back after day 1? A summary is consumed once and then dead. There is no obvious mastery loop, social loop, creation loop, or utility loop.</li><li>The content problem is ugly. Where do the summaries come from? If you generate them with AI, quality will be uneven, generic, and often wrong. If you source them manually, congrats, you just signed up for a content business disguised as an app.</li><li>The licensing problem is hand-waved away. Summarizing copyrighted books at scale is not the same as having a clean content pipeline. Even if it is legally survivable, platform risk and publisher complaints are real. UNVERIFIED.</li><li>The &quot;daily&quot; angle is not a moat. Daily notifications are not a strategy. They are what every mediocre app does when it has nothing worth returning for.</li><li>Measuring reading improvement is unclear. Duolingo teaches a skill with feedback. Book summaries mostly let users feel productive without doing the hard thing. This may optimize for fake accomplishment, not real reading.</li><li>The app risks becoming intellectual junk food: shallow, compressed, forgettable content that flatters the user while building almost no durable habit besides tapping through cards.</li><li>The best-case MVP still needs structured content, ranking, recommendations, streak logic, onboarding, user state, summary rendering, and a reason to progress. The description pretends all of that is already solved when none of it is even specified.</li><li>If the real wedge is &quot;learn from nonfiction faster,&quot; then the product should be built around recall, notes, spaced repetition, and action extraction. If it is just &quot;read summaries every day,&quot; that is weak and easily ignored after the novelty dies.</li><li>Key Questions:</li><li>Why does the user come back after day 1?</li><li>What is the actual skill being improved: reading speed, comprehension, recall, knowledge breadth, or just consumption streaks?</li><li>Where does the content come from, and who is doing the cleanup when AI summaries are bland or wrong?</li><li>Why would a user pick this over Blinkist, Shortform, YouTube explainers, podcasts, or just asking ChatGPT for a summary?</li><li>Is the first MVP based on public-domain books, licensed books, or unverified AI summaries of copyrighted books?</li><li>What is the smallest loop that creates real value in under 5 minutes, not fake productivity theater?</li><li>Suggestions:</li><li>Drop the &quot;Duolingo&quot; framing unless you can define a genuine progression system with feedback, difficulty, and mastery.</li><li>Narrow the niche hard. Example: &quot;Daily nonfiction lesson cards for startup, psychology, or investing books&quot; is at least more focused than &quot;all books.&quot;</li><li>Replace passive summaries with active recall: 3-5 key idea cards, one question, one reflection, one saved takeaway.</li><li>Start with public-domain or creator-permission content to avoid building on legal fog.</li><li>Make the MVP a &quot;daily lesson from one book&quot; app, not a full summary library. Less catalog, more loop.</li><li>If you cannot articulate a retention mechanic beyond streaks and notifications, kill it early.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev Check</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the app shell, streaks, auth, and simple lesson flow are easy; the real problem is differentiated content quality and retention, which AI coding does not magically solve.</li><li>Biggest solo complexity traps: content sourcing and cleanup, copyright/licensing risk, building a real progression loop instead of fake gamification, generating enough high-quality daily material, recommendation logic once the library grows, and avoiding a generic AI-summary experience that users churn from immediately.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Files Read</div><div class=\"tag-row\"><span class=\"etag\">critique-v1.md</span></div></div>"

// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
