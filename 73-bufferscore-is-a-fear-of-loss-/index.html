<script>window.IDEA_DATA = {"ideaNum": 73, "title": "BufferScore", "sub": "A blunt layoff-readiness audit for software engineers.", "score": "6/10", "deviceType": "MOBILE", "stitchId": "11031518220563200807", "startScreen": 1, "screens": [{"id": "3c130b3d570842c6b585d4791d0b24eb", "label": "Landing Page"}, {"id": "ae86d515c77044cd9218fafece47e473", "label": "Audit Step 1 - Cash Runway"}, {"id": "9292031f5174423ba3ca46d9e5962644", "label": "Audit Step 2 - Search Assets"}, {"id": "4a0317b4291b4e64938c469f15a13e00", "label": "Audit Step 3 - Contact + Save Result"}, {"id": "8f48b3b38b08419c91fb8d41da2639aa", "label": "Results Summary"}, {"id": "431583048e944e5d8b3921e03b9f2546", "label": "Ranked Action Queue"}, {"id": "3f54bb6dc41b40559dc5368dd689f9ab", "label": "Action Detail"}, {"id": "30ea2073ea644fcf98ed0cfdbf2631f4", "label": "Return / Recheck Audit"}, {"id": "b65a14c2ef3149b88d44f501408558a5", "label": "Honesty / Methodology"}], "timeline": [{"status": "", "icon": "💡", "title": "Original Idea", "desc": "BufferScore is a fear-of-loss app that copies the Credit Karma model but applies it to job security instead of creditworthiness.", "verdict": "", "verdictClass": "needs", "score": "", "body": "<div class=\"esect\"><div class=\"esect-label\">Version: v1 (Original)</div><div class=\"esect\"><p>**Date:** 2026-04-08 18:09 **Status:** submitted</p></div></div><div class=\"esect\"><div class=\"esect-label\">Description</div><div class=\"esect\"><p>BufferScore is a fear-of-loss app that copies the Credit Karma model but applies it to job security instead of creditworthiness. You enter your savings, fixed monthly burn, role, industry, and rough interview readiness, and the app instantly calculates a Layoff Buffer Score showing how exposed you are if your paycheck disappears. The reveal is immediate and screen-recordable: a bold score like &#x27;34/100&#x27; with one blunt sentence explaining your runway and rehire risk, such as &#x27;At your current burn, one bad month leaves you with 7.4 weeks of runway and below-median rehire odds.&#x27; The loop is simple: update your numbers, watch the score rise or fall with your cash buffer and market conditions, and come back weekly because job anxiety gets worse when it stays vague.</p></div></div>"}, {"status": "critique", "icon": "🪓", "title": "Critique v1", "desc": "Strong hook, weak credibility and retention loop.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "4/10", "body": "<div class=\"esect\"><div class=\"esect-label\">Overview</div><div class=\"esect\"><p>Verdict: NEEDS MAJOR WORK Score: 4/10 What&#x27;s Actually Good:</p></div><div class=\"esect\"><ul><li>The core hook is instantly legible. &quot;Credit score for layoff risk&quot; is a strong one-line pitch.</li><li>The first-run experience is simple enough for a solo dev to ship: collect a few inputs, calculate runway, show a harsh score.</li><li>The screen-recordable reveal has decent viral potential because people love sharing flattering scores and doomposting bad ones.</li></ul></div><div class=\"esect\"><p>Brutal Feedback:</p></div><div class=\"esect\"><ul><li>This is mostly a dressed-up emergency fund calculator. The &quot;Layoff Buffer Score&quot; sounds novel until you strip away the branding and realize it is savings divided by burn with a vague confidence penalty.</li><li>Your core promise breaks the moment the user asks, &quot;Why should I trust this number?&quot; Credit Karma piggybacks on a real system with standardized underlying data. You have no equivalent. You are inventing a fake authority layer over messy personal finance and labor-market uncertainty.</li><li>&quot;Interview readiness&quot; is hand-wavy nonsense unless you operationalize it. Self-reported readiness is vanity input. People who are delusional will rate themselves highly, and desperate users will underrate themselves. Either way, your model becomes mood tracking, not risk scoring.</li><li>&quot;Role&quot; and &quot;industry&quot; are not enough to estimate rehire odds in any defensible way. Seniority, geography, compensation band, visa status, network strength, niche stack, portfolio quality, and hiring cycle matter. If you ignore those, the score is shallow. If you include them, your onboarding gets bloated and ugly.</li><li>The phrase &quot;market conditions&quot; is doing criminal amounts of work here. Where does that data come from? If the differentiator depends on live labor-market inputs, that dependency is UNVERIFIED. No verified data source means no credible moat and no 8/10 fantasy score.</li><li>The retention story is weak. Why does the user come back after day 1? Their savings do not meaningfully change every week. Their burn might not change either. Most users will check once, feel attacked, maybe share it, then leave.</li><li>Fear-based products are easy to try and easy to resent. If the app keeps telling people they are screwed without giving them a concrete path to improvement, it becomes emotional junk food: intense first bite, no durable habit.</li><li>The product risks being too soft to be trusted and too harsh to be liked. If the score is blunt, users may reject it as doom bait. If you soften it, the app loses its edge and becomes generic budgeting fluff.</li><li>There is no obvious monetization that does not feel gross. Subscription for anxiety? Affiliate links to high-yield savings accounts? Resume coaches? Insurance-style upsells? All of that starts smelling opportunistic fast.</li><li>The comparison to Credit Karma is more damaging than helpful. Credit Karma works because the score already exists in the world and lenders care about it. Your score is invented by the app itself. That makes this closer to a content gimmick than a trusted system.</li><li>If you plan to personalize advice, you now need credible recommendations across budgeting, job search, interview prep, and labor-market intel. That is four products pretending to be one.</li><li>If you do not personalize advice, the product is basically: &quot;You have 2.3 months of runway, spend less and job hunt harder.&quot; Congratulations, you built a calculator with emotional branding.</li></ul></div><div class=\"esect\"><p>Key Questions:</p></div><div class=\"esect\"><ul><li>Why does the user come back after day 1?</li><li>What exact inputs make the score feel credible rather than arbitrary?</li><li>What verified source, if any, powers the &quot;market conditions&quot; or rehire-odds layer?</li><li>What action does the user take immediately after seeing a bad score besides feeling worse?</li><li>What makes this better than a spreadsheet, a budgeting app, or a ChatGPT prompt that estimates runway for free?</li><li>Are you building a diagnostic toy, a habit product, or a lead-gen funnel for financial/job services? Right now it is awkwardly between all three.</li></ul></div><div class=\"esect\"><p>Suggestions:</p></div><div class=\"esect\"><ul><li>Cut the fake precision. Do not pretend to predict layoff odds or rehire probability unless you have validated data. Start with a brutally honest &quot;runway + readiness&quot; calculator and label uncertainty clearly.</li><li>Replace the single score with 2-3 sub-scores the user can actually influence: cash runway, job-search readiness, income resilience. That reduces the &quot;made-up magic number&quot; problem.</li><li>Add a concrete action loop or this dies instantly. Example: one weekly checkpoint with one recommended action, such as cut one recurring expense, finish one resume improvement, or complete one mock interview.</li><li>Narrow the audience hard. &quot;Knowledge workers worried about layoffs&quot; is lazy. Pick one segment like mid-career tech employees in expensive cities. Broad anxiety products usually become vague products.</li><li>Treat live market data as optional until verified. Ship v1 with user-input-only logic and honest framing instead of building around an external data fantasy you may not be able to source cheaply or legally.</li><li>Test demand with a landing page and fake-door score reveal before building a full app. If people will not give you their numbers for the promise alone, the product is weaker than the copy.</li></ul></div><div class=\"esect\"><p>Solo Dev Reality Check:</p></div><div class=\"esect\"><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — a narrow v1 calculator with a blunt reveal, simple history, and zero real market-data integration is feasible. A credible scoring product with dynamic labor-market intelligence is not.</li><li>Biggest solo complexity traps: inventing a scoring model that looks authoritative without becoming fraudulent nonsense; sourcing and maintaining labor-market data; overbuilding onboarding to compensate for weak prediction quality; trying to add personalized advice across finance and careers; building retention features for a product that users naturally need only occasionally.</li></ul></div></div>"}, {"status": "improve", "icon": "🛠️", "title": "Improved v2", "desc": "Shifted to transparent sub-scores and a weekly action loop.", "verdict": "", "verdictClass": "worth", "score": "", "body": "<div class=\"esect\"><div class=\"esect-label\">Version: v2</div><div class=\"esect\"><p>**Date:** 2026-04-08 18:11 **Status:** improved</p></div></div><div class=\"esect\"><div class=\"esect-label\">Original Idea</div><div class=\"esect\"><p>BufferScore is a fear-of-loss app that copies the Credit Karma model but applies it to job security instead of creditworthiness.</p></div></div><div class=\"esect\"><div class=\"esect-label\">What Changed and Why</div><div class=\"esect\"><ul><li>Replaced the fake all-knowing layoff score with three transparent sub-scores: Cash Runway, Job Search Assets, and Income Backup. This fixes the credibility problem because each score comes from user-verifiable inputs instead of invented rehire odds or vague market predictions.</li><li>Narrowed the audience to mid-career software engineers in high-cost US cities and turned &quot;interview readiness&quot; into a concrete checklist. This removes bloated onboarding and makes the product useful for one segment with similar job-search behaviors instead of pretending to model every worker.</li><li>Added a weekly action loop: one checkpoint, one recommended task, and visible progress over time. This fixes retention and the &quot;feel bad then leave&quot; problem by giving users a next step they can complete in 20-40 minutes.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Improved Description</div><div class=\"esect\"><p>BufferScore v2 is no longer a &quot;credit score for layoffs.&quot; It is a weekly layoff-readiness tracker for mid-career software engineers living in expensive US cities who want to know one honest thing: if income stopped this month, how ready are they to absorb the hit and restart earning?</p></div><div class=\"esect\"><p>The product gives users three separate sub-scores instead of one fake authority number:</p></div><div class=\"esect\"><ul><li>Cash Runway: months of survival based on liquid savings and monthly essentials.</li><li>Job Search Assets: a checklist score based on whether resume, LinkedIn, portfolio/GitHub, references, and target-company list are actually ready.</li><li>Income Backup: whether the user has realistic fallback options already set up, such as active recruiter conversations, contract leads, consulting availability, or a partner income buffer.</li></ul></div><div class=\"esect\"><p>Each sub-score is explained in plain language with the exact inputs used. No market-condition API, no rehire probability, no &quot;AI predicts your layoff risk.&quot; The app is explicit that it is a preparedness tool, not a prediction engine.</p></div><div class=\"esect\"><p>The core loop is a weekly 5-minute check-in. Users update cash, expenses, and checklist items, then the app gives exactly one recommended action for the week, chosen from a small authored library: cancel one recurring expense, finish the resume bullet pass, message two warm contacts, assemble references, or publish a portfolio sample. The win state is not &quot;feel informed.&quot; The win state is &quot;be 30-day job-search ready.&quot; Users come back in week 2 because the app tracks whether last week&#x27;s action was completed, unlocks the next highest-leverage task, and shows progress from &quot;exposed&quot; to &quot;ready.&quot;</p></div><div class=\"esect\"><p>What makes it better than a spreadsheet or generic budgeting app is that it combines money runway with career-readiness tasks in one narrow workflow. What makes it better than a ChatGPT prompt is persistence: saved baseline, weekly history, and a concrete action ladder instead of one disposable answer.</p></div><div class=\"esect\"><p>Biggest assumptions that could kill the product:</p></div><div class=\"esect\"><ul><li>VERIFIED: Users understand and care about a simple runway number. This is already validated by the appeal of emergency-fund calculators and the original hook.</li><li>UNVERIFIED: Mid-career software engineers will return weekly for a guided readiness loop, not just run the calculator once. This is the main product risk, so it is not the moat. Fallback plan: position v1 as a one-time &quot;Layoff Readiness Audit&quot; lead capture tool and test weekly retention before building deeper habit mechanics.</li><li>VERIFIED: A manually authored action library for one narrow segment is feasible for a solo builder in v1. The content burden is real but bounded because it only needs a few dozen task templates, not live labor-market data.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Why This Is Worth Building (Solo + AI)</div><div class=\"esect\"><p>This is viable for a solo developer because the product is mostly forms, scoring rules, simple history, and a small authored recommendation system, all of which fit a 2-4 week AI-assisted build. It has a better chance of working because it drops fake prediction, narrows the audience, and gives users a weekly action loop that can create repeat usage instead of a one-time anxiety spike.</p></div></div><div class=\"esect\"><div class=\"esect-label\">Solo MVP Scope</div><div class=\"esect\"><ul><li>What&#x27;s in v1: onboarding for one target segment; the three sub-scores; transparent scoring explanations; weekly check-in flow; one recommended action per week; progress history for prior check-ins; a small authored action library and scoring rubric for software engineers in high-cost US cities.</li><li>What&#x27;s out of v1: layoff prediction, rehire odds, live market data, role/industry benchmarking, AI resume review, personalized financial planning, social sharing, referrals, monetization, notifications, partnerships, and any feature that depends on user-generated content or marketplace supply.</li><li>Estimated build time with AI coding tools: 2.5 to 3.5 weeks total, including 6-8 days for UI/app logic, 3-4 days for authored content prep and scoring rubric design, 1-2 days for auth/data/storage setup, and 2-3 days for QA, polish, and issue fixes.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Open Questions</div><div class=\"esect\"><ul><li>Will the target segment complete weekly check-ins at all, or is this fundamentally a one-time audit product?</li><li>Which exact thresholds for &quot;good enough&quot; runway and readiness feel motivating rather than alarmist for this audience?</li><li>What is the lightest onboarding that still gathers enough data for useful weekly actions?</li><li>Is the best go-to-market a landing page with an instant audit, or a private beta aimed at laid-off / layoff-anxious engineers?</li><li>If retention is weak, should v2 become a downloadable audit plus email sequence instead of a persistent app?</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff</div><div class=\"esect\"><p>List every screen/view the app needs so a designer or AI design tool can start immediately:</p></div><div class=\"esect\"><ul><li>Screen 1: Landing / Value Proposition — explain the product for mid-career software engineers, show the three sub-scores, and make the promise clear: &quot;Know your runway. Fix one weak spot each week.&quot;</li><li>Screen 2: Onboarding Step 1 - Financial Baseline — collect liquid savings, monthly essential spend, dependents/household context, and current employment status; show helper text for what counts as &quot;essential spend.&quot;</li><li>Screen 3: Onboarding Step 2 - Job Search Assets — checklist inputs for resume freshness, LinkedIn status, portfolio/GitHub readiness, references, and target-company list.</li><li>Screen 4: Onboarding Step 3 - Income Backup — collect fallback options such as contract leads, recruiter conversations, partner income support, and side-income readiness.</li><li>Screen 5: Results Dashboard — show the three sub-scores, the reasoning behind each, the biggest weak point, and the single recommended action for this week.</li><li>Screen 6: Sub-Score Detail View — drill into one sub-score with contributing inputs, threshold labels, and exactly how to improve it.</li><li>Screen 7: Weekly Check-In — lightweight update form for changed cash, burn, and completed checklist items; ends with a new weekly recommendation.</li><li>Screen 8: Action Detail / Task Card — explain the recommended task, why it matters, expected completion time, and a simple done / skipped state.</li><li>Screen 9: Progress History — show prior weekly check-ins, sub-score trends, and completed actions so users can see forward motion.</li><li>Screen 10: Settings / Assumptions — let users edit baseline assumptions, reset their profile, and review the product&#x27;s honesty note that this is a preparedness tool, not a prediction engine.</li></ul></div><div class=\"esect\"><p>Key interactions:</p></div><div class=\"esect\"><ul><li>User lands on the value proposition, starts onboarding, completes the three input steps, and reaches the dashboard with immediate sub-scores and one recommended action.</li><li>From the dashboard, the user can open any sub-score detail to understand why it is weak and what inputs affect it.</li><li>Each week, the user opens the check-in flow, updates changed numbers and checklist items, receives one new task card, and then sees the updated progress history.</li><li>The action detail screen feeds back into the dashboard and history after the task is marked done or skipped.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Version History</div><div class=\"esect\"><ul><li>v1: Original idea</li><li>v1.1: Critique - strong hook, but mostly a fake-authority emergency fund calculator with weak retention and unverified market-data assumptions</li><li>v2: Improved - narrowed to a layoff-readiness tracker with transparent sub-scores and a weekly action loop for one target segment</li></ul></div></div>"}, {"status": "critique", "icon": "🪓", "title": "Critique v2", "desc": "Audit wedge improved, but weekly retention still looked forced.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">Overview</div><div class=\"esect\"><p>Verdict: NEEDS MAJOR WORK Score: 6/10 What&#x27;s Actually Good:</p></div><div class=\"esect\"><ul><li>This is meaningfully better than v1 because it stops pretending to predict layoffs and switches to inputs users can verify without magical black-box nonsense.</li><li>The scope is finally narrow enough that a solo developer could plausibly ship an MVP instead of drowning in fake market intelligence and overbuilt onboarding.</li><li>The combination of cash runway plus job-search readiness is at least a real user problem, not pure startup cosplay.</li></ul></div><div class=\"esect\"><p>Brutal Feedback:</p></div><div class=\"esect\"><ul><li>You fixed the credibility problem, but you did not fix the demand problem. This still smells like a one-time anxiety audit dressed up as a weekly product.</li><li>The retention story is still the soft underbelly. Why does the user come back after day 1? Because you assign one task per week? That is not a retention loop. That is a polite to-do list.</li><li>Mid-career software engineers are exactly the kind of users who will say, &quot;Cool idea,&quot; run the audit once, steal the framework, and recreate it in Notion, a spreadsheet, or ChatGPT for free.</li><li>&quot;Persistence&quot; is not a moat. Saved history and weekly progress are commodity features. Every half-competent builder with Supabase can clone that in a weekend.</li><li>The three sub-scores are cleaner, but two of them are still heavily self-reported and therefore squishy. &quot;Resume ready,&quot; &quot;references assembled,&quot; and &quot;contract leads&quot; are easy to game, misjudge, or interpret inconsistently.</li><li>The Income Backup score is especially shaky. A recruiter conversation is not income. &quot;Consulting availability&quot; is not income. Partner support is real, but awkward, sensitive, and easy to skip or misstate. You are mixing hard financial facts with vibes and calling it a score.</li><li>The recommended action engine risks becoming fake personalization. If the app mostly maps weak scores to a small authored task library, users may correctly conclude the product is a glorified rules engine with concern-marketing wrapped around it.</li><li>The target audience is narrow, but the emotional hook is still broad and messy. Many mid-career engineers do not want a weekly reminder that they are one reorg away from panic. Fear gets clicks. It does not automatically get healthy repeat behavior.</li><li>The product has a positioning problem: is it a preparedness tool, a career-maintenance tool, or an anxiety-management ritual? If it tries to be all three, it becomes muddy and easier to ignore.</li><li>The build estimate is optimistic in the most dangerous way: not because the code is hard, but because the scoring rubric and action content will take more judgment, iteration, and user-testing than the spec admits.</li><li>The content burden is &quot;bounded&quot; only if the advice is generic. The more specific and useful the tasks become, the more edge cases you inherit around visa holders, staff-level candidates, parents, dual-income households, and people with nontraditional portfolios.</li><li>The product still has weak monetization optics. Charging anxious people a subscription to be told they are underprepared can feel predatory fast.</li><li>This is better framed as a sharp one-time layoff-readiness audit with optional follow-up than as a habit product. Trying to force weekly usage too early is how you build a mediocre app around a decent calculator.</li></ul></div><div class=\"esect\"><p>Key Questions:</p></div><div class=\"esect\"><ul><li>Why does the user come back after day 1?</li><li>What makes the weekly loop materially better than a spreadsheet plus a recurring calendar reminder?</li><li>Which sub-score inputs are objective enough to feel trustworthy, and which are just self-soothing theater?</li><li>If users ignore the weekly task for two weeks, what happens besides passive guilt accumulation?</li><li>Is the real product the audit, the action plan, or the progress tracker?</li><li>What proof would convince you this deserves to be a persistent app rather than a lead magnet or downloadable worksheet?</li></ul></div><div class=\"esect\"><p>Suggestions:</p></div><div class=\"esect\"><ul><li>Stop overselling weekly retention. Treat recurring usage as unverified and build the first version like a brutally useful one-time audit with optional check-ins.</li><li>Make the scoring harsher and simpler. Favor fewer, more objective inputs over broader but mushier readiness categories.</li><li>Separate hard facts from soft signals. Do not let liquid savings and &quot;talked to one recruiter&quot; sit side by side as if they have comparable reliability.</li><li>Replace &quot;one recommended action&quot; with a ranked action queue so the product feels less arbitrary and users can choose based on available time.</li><li>Test the wedge before building history screens. A landing page plus instant audit plus email follow-up may teach you more than shipping a full persistent app.</li><li>If early users do not complete a second check-in, downgrade the product immediately into an audit tool instead of pretending the habit loop is working.</li></ul></div><div class=\"esect\"><p>Solo Dev Reality Check:</p></div><div class=\"esect\"><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the app UI and logic are simple enough, but the real work is defining credible rubrics, writing useful action content, and not lying to yourself about retention.</li><li>Biggest solo complexity traps: overestimating weekly retention; mixing objective and subjective inputs into fake precision; underestimating content/rubric design time; building too many screens before validating the audit wedge; creating advice that feels generic to a skeptical technical audience.</li></ul></div></div>"}, {"status": "improve", "icon": "🛠️", "title": "Improved v3", "desc": "Refocused on a one-time audit with an objective queue and optional recheck.", "verdict": "", "verdictClass": "worth", "score": "", "body": "<div class=\"esect\"><div class=\"esect-label\">Version: v3</div><div class=\"esect\"><p>**Date:** 2026-04-08 18:16 **Status:** improved</p></div></div><div class=\"esect\"><div class=\"esect-label\">Original Idea</div><div class=\"esect\"><p>BufferScore is a fear-of-loss app that copies the Credit Karma model but applies it to job security instead of creditworthiness.</p></div></div><div class=\"esect\"><div class=\"esect-label\">What Changed and Why</div><div class=\"esect\"><ul><li>Reframed the product from a weekly habit app into a brutally useful one-time layoff-readiness audit with optional 14-day recheck. This directly addresses the critique that weekly retention was being faked instead of earned.</li><li>Cut the mushy sub-scores and removed Income Backup entirely. v3 scores only objective, defensible inputs: liquid savings, essential monthly burn, resume recency, LinkedIn recency, and whether the user has a ready-to-send resume file plus a named target-company list. This fixes the trust problem caused by mixing hard facts with vibes.</li><li>Replaced the &quot;one recommended task&quot; rules engine with a ranked action queue tied to score impact and time required. This makes the output feel less arbitrary, gives the user choice, and turns the product into an audit plus execution aid instead of fake AI coaching.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Improved Description</div><div class=\"esect\"><p>BufferScore v3 is a layoff-readiness audit for mid-career software engineers, not a weekly anxiety ritual. The user spends 5-7 minutes entering hard facts only: liquid savings, essential monthly spend, last time they updated their resume, last time they updated LinkedIn, whether they already have a current PDF resume ready to send, and whether they have a saved shortlist of target companies. The app then produces a harsh but transparent result: a Runway Grade, a Search Readiness Grade, and a single overall status such as Fragile, Recoverable, or Ready.</p></div><div class=\"esect\"><p>The key output is not &quot;keep checking your score every week.&quot; The output is a ranked fix queue showing the 3-5 highest-leverage actions to improve readiness fast. Each action has a reason, expected impact, and time estimate. Example actions: cut $400 from monthly burn, export a current resume PDF tonight, refresh LinkedIn headline and top five bullets, or save 20 target companies into one list. The queue is generated from explicit rules the user can understand, not fake personalization.</p></div><div class=\"esect\"><p>The product positioning is now clear: BufferScore is a preparedness audit with an execution plan. It does not predict layoffs, manage anxiety, or promise a durable habit loop. It helps a skeptical technical user answer one practical question: &quot;If I lost my job this quarter, what are the few concrete gaps that would hurt me most?&quot; That framing makes it more credible, more useful, and less easily dismissed as a spreadsheet clone because the value is in the harsh rubric, clean prioritization, and fast output, not in generic persistence features.</p></div><div class=\"esect\"><p>Why would users come back in week 2? Some will not, and v1 should assume that. The realistic return trigger is finishing one or two actions from the ranked queue and rerunning the audit to see if they moved from Fragile to Recoverable. To support that, v1 includes one optional 14-day reminder email with a deep link back to the saved audit. If second-check usage is weak, the product should stay positioned as a one-time audit tool and not expand into a habit app.</p></div><div class=\"esect\"><p>3 biggest assumptions that could kill the product:</p></div><div class=\"esect\"><ul><li>VERIFIED: Users care about a blunt runway calculation anchored in liquid savings and essential burn. This is the most credible part of the concept and is already familiar from emergency-fund behavior.</li><li>FALSE: Mid-career engineers want a weekly layoff-anxiety ritual. The critique is right that this is not a credible core behavior, so weekly usage is removed from the product pitch and MVP value proposition.</li><li>UNVERIFIED: A ranked action queue based on a harsh, simple rubric will feel materially more useful than a spreadsheet or ChatGPT prompt. This is the main product risk, so it is not the moat. Fallback plan: if users treat the queue as too easy to copy, package the audit as a lead-gen tool or downloadable worksheet and stop investing in persistence features.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Why This Is Worth Building (Solo + AI)</div><div class=\"esect\"><p>This is viable for a solo developer because the MVP is mostly a landing page, a short audit flow, transparent scoring logic, a small authored action library, and one optional email reminder. AI coding tools help with the form logic, scoring implementation, copy iteration, and deployment, while the real human effort stays focused on the rubric and action content that actually determine whether the product feels useful.</p></div></div><div class=\"esect\"><div class=\"esect-label\">Solo MVP Scope</div><div class=\"esect\"><ul><li>What&#x27;s in v1: landing page; 5-7 minute audit flow; objective scoring for runway and search-readiness; a final results page with harsh status labels; ranked action queue with impact and time estimates; optional email capture to receive the result and one 14-day recheck reminder; saved audit session via magic link or simple tokenized return flow.</li><li>What&#x27;s out of v1: weekly check-ins, progress history, streaks, notifications beyond one reminder email, social sharing, recruiter or market data, AI resume review, benchmarking, partner-income logic, contract-income logic, community features, user-generated content, monetization, and any feature that depends on users returning regularly.</li><li>Estimated build time with AI coding tools: 2 to 3 weeks total, including 4-5 days for UI and audit logic, 3-4 days for rubric and action-library content prep, 1-2 days for email and return-link setup, 1 day for analytics/instrumentation, and 2-3 days for QA, copy tuning, and issue fixes.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Open Questions</div><div class=\"esect\"><ul><li>Do users actually rerun the audit after 14 days, or is this best kept as a single-session tool plus emailed result?</li><li>Which search-readiness inputs are objective enough to stay in the rubric without drifting back into self-soothing theater?</li><li>Does &quot;save your result and get one reminder&quot; convert better than letting the audit remain fully anonymous?</li><li>What proof threshold will justify building persistence later: second-session rate, email capture rate, or action completion self-report?</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff</div><div class=\"esect\"><p>List every screen/view the app needs so a designer or AI design tool can start immediately:</p></div><div class=\"esect\"><ul><li>Screen 1: Landing Page — explain the product as a blunt layoff-readiness audit for software engineers; show the promise, sample output, trust notes, and primary CTA to start the audit.</li><li>Screen 2: Audit Step 1 - Cash Runway — collect liquid savings and essential monthly spend; explain what counts as liquid savings and essential burn; show simple inline validation.</li><li>Screen 3: Audit Step 2 - Search Assets — collect objective readiness inputs: resume last updated date, LinkedIn last updated date, whether a sendable PDF resume exists, and whether a target-company list exists.</li><li>Screen 4: Audit Step 3 - Contact + Save Result — optional email capture to send the result and a 14-day reminder; explain that returning is optional and the product is primarily a one-time audit.</li><li>Screen 5: Results Summary — show Runway Grade, Search Readiness Grade, overall status, plain-language explanation, and the top three reasons the user is vulnerable.</li><li>Screen 6: Ranked Action Queue — show the prioritized actions with impact, estimated time, and rationale; allow the user to expand each action to see exact instructions.</li><li>Screen 7: Action Detail — present one action in full detail with why it matters, what done looks like, and a link back to the queue or rerun flow.</li><li>Screen 8: Return / Recheck Audit — prefill prior answers when available, let the user update changed inputs quickly, and regenerate results after the reminder flow.</li><li>Screen 9: Honesty / Methodology — explain the rubric, what is intentionally excluded, and why this is a preparedness audit rather than a prediction product.</li></ul></div><div class=\"esect\"><p>Key interactions:</p></div><div class=\"esect\"><ul><li>User lands on the landing page, starts the audit, completes the three-step input flow, and reaches the results summary plus ranked action queue.</li><li>From the results summary, the user opens any action detail, completes work offline, and optionally requests the emailed result plus recheck reminder.</li><li>A returning user opens the reminder link, updates only the changed fields in the recheck flow, and gets a refreshed result without needing a full account system.</li></ul></div></div><div class=\"esect\"><div class=\"esect-label\">Version History</div><div class=\"esect\"><ul><li>v1: Original idea</li><li>v2.1: Critique - weekly retention was unconvincing, the score mixed hard facts with vibes, and the product was better as an audit than a habit app</li><li>v3: Improved - repositioned as a one-time layoff-readiness audit with objective inputs, a ranked fix queue, and only an optional 14-day recheck</li></ul></div></div>"}, {"status": "critique", "icon": "🪓", "title": "Critique v3", "desc": "The queue became the core risk: useful or just a polished spreadsheet.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">Overview</div><div class=\"esect\"><p>Verdict: NEEDS MAJOR WORK Score: 6/10 What&#x27;s Actually Good:</p></div><div class=\"esect\"><ul><li>This is finally honest about what it is: a layoff-readiness audit, not fake AI prophecy.</li><li>The scope is narrow enough that a solo developer can actually ship an MVP instead of disappearing into labor-market data cosplay.</li><li>The input set is cleaner and more defensible than prior versions because it leans on facts users can verify instead of mushy self-esteem metrics.</li></ul></div><div class=\"esect\"><p>Brutal Feedback:</p></div><div class=\"esect\"><ul><li>You improved the honesty and accidentally exposed the problem: this is dangerously close to a polished spreadsheet with mean copy. &quot;Liquid savings divided by burn, plus whether your resume exists&quot; is useful, but it is not obviously a product.</li><li>The core differentiator is explicitly UNVERIFIED: the ranked action queue. If that queue does not feel dramatically better than what ChatGPT, a checklist, or a good blog post can produce, the entire app collapses into a one-shot calculator with branding.</li><li>The target user is skeptical, technical, and perfectly capable of rebuilding the rubric in Notion after one use. You are selling a framework to people most likely to steal frameworks.</li><li>The &quot;harsh rubric&quot; is not a moat. It is a tone choice. Tone can make a landing page sharper, but it does not create durable value.</li><li>The product still has a retention problem, even if you stopped lying about it. Why does the user come back after day 1? Maybe they rerun it in 14 days. Maybe. That is not a loop; that is a hope.</li><li>Optional email capture is a conversion tax on an already low-frequency tool. Many users will want the answer without giving you their email, and the ones who do give it may never come back anyway.</li><li>The search-readiness side is more objective than before, but still blunt to the point of being crude. &quot;Resume updated recently&quot; and &quot;target-company list exists&quot; are weak proxies for actual job-search readiness. A polished but bad resume still passes. A target-company list can be useless theater.</li><li>The action queue risks becoming fake usefulness in a new costume. &quot;Cut $400 from burn, refresh LinkedIn, save 20 companies&quot; is not product magic. It is obvious advice arranged in descending order.</li><li>The app can easily produce false confidence. Someone with six months of savings and a fresh resume may still be in terrible shape because their comp target is unrealistic, their network is weak, or their niche market is frozen. You removed fake precision, but the simplified rubric can still mislead.</li><li>The emotional positioning is awkward. If the app is too blunt, it feels like doom-content. If it is toned down, it becomes generic preparedness content. You are still walking a thin line between useful honesty and anxiety-branded theater.</li><li>The build estimate is probably still too optimistic because the code is not the hard part. The hard part is authoring a rubric and action library that does not feel generic, embarrassing, or trivially copyable.</li><li>There is still no obvious business here. A one-time audit with weak repeat behavior is usually content marketing, not a standalone software company.</li></ul></div><div class=\"esect\"><p>Key Questions:</p></div><div class=\"esect\"><ul><li>Why does the user come back after day 1?</li><li>What specific proof would show that the ranked action queue is materially better than a spreadsheet, a template, or a ChatGPT prompt?</li><li>Which search-readiness inputs are actually predictive of faster recovery versus merely easy to collect?</li><li>If the best version of this is a one-time audit, why is this an app at all instead of a sharp interactive landing page plus downloadable worksheet?</li><li>What outcome are you trying to own: email capture, second-session recheck, or paid conversion? Right now the success metric is still fuzzy.</li></ul></div><div class=\"esect\"><p>Suggestions:</p></div><div class=\"esect\"><ul><li>Treat the ranked action queue as the only thing that matters and validate it ruthlessly before building much product around it.</li><li>Strip the MVP further if needed: landing page, instant audit, results, queue, optional email. Do not spend solo-dev weeks on reminder plumbing until the queue proves it has teeth.</li><li>Force stronger evidence into the action system. Every action should map to a visible score delta and a concrete &quot;done means this&quot; definition, or it will feel like content sludge.</li><li>Consider packaging this as a lead-gen diagnostic or premium worksheet first. That may be the honest shape of the opportunity.</li><li>Test whether users trust the output enough to share an email or rerun the audit. If they do neither, the product is informational candy, not software worth compounding on.</li></ul></div><div class=\"esect\"><p>Solo Dev Reality Check:</p></div><div class=\"esect\"><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the software is simple, but making the rubric and action queue feel worth using is the real work, and that is easy to underestimate.</li><li>Biggest solo complexity traps: spending too long polishing commodity UI for a tool people may use once; writing a queue that feels generic to skeptical engineers; mistaking low-frequency usefulness for retention; overbuilding email/save-state flows before the audit wedge is validated; creating a scoring model that sounds crisp but quietly overpromises.</li></ul></div></div>"}, {"status": "design", "icon": "🎨", "title": "Design Created", "desc": "Nine-screen mobile prototype exported from Stitch and prepared for GitHub Pages.", "verdict": "READY", "verdictClass": "worth", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">Prototype</div><p>Mobile design generated in Stitch, normalized into a single clickable audit flow, and prepared for GitHub Pages deployment.</p></div><div class=\"esect\"><div class=\"esect-label\">Project</div><div class=\"tag-row\"><span class=\"etag blue\">11031518220563200807</span><span class=\"etag green\">designing</span></div></div>"}]};</script>

  .phone-frame {

      0 0 0 1px rgba(255,255,255,0.08),

    flex-shrink: 0;
  }

  /* WEB frame */
  .web-frame {
    width: min(900px, calc(100% - 80px));

  /* ── Resize handle ───────────────────────────────── */

  .resize-handle:hover::after { background: #374151; }

  /* ── Timeline column ─────────────────────────────── */

    padding: 20px 28px 14px;

  .timeline-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

  /* ── Timeline line + dots ────────────────────────── */

    padding-left: 28px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
  }
  .timeline-line::before {
    content: '';
    position: absolute;
    left: calc(var(--lx) - 1px); /* 2px line centered at --lx */

  .entry-info { flex: 1; min-width: 0; }

  .verdict {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .verdict-needs { background: #451a03; color: #fb923c; }
  .verdict-worth { background: #14532d; color: #86efac; }

  .entry-body {
    display: none;

    padding: 14px;

  }
  .entry.open .entry-body { display: block; }

  .esect { margin-top: 10px; }
  .esect:first-child { margin-top: 0; }
  .esect-label {
    font-size: 0.62rem; font-weight: 700;

</style>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
