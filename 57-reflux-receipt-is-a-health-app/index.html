<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1a;
    color: #f9fafb;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ──────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .idea-num {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: #3b82f6; background: #1e3a5f;
    padding: 3px 10px; border-radius: 99px;
    flex-shrink: 0;
  }
  .idea-title { font-size: 1.1rem; font-weight: 700; color: #f9fafb; }
  .idea-sub { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    border-radius: 99px; padding: 4px 12px;
    font-size: 0.75rem; color: #9ca3af;
  }
  .score-pill {
    background: #1a2e1a; border: 1px solid #2d4a2d;
    color: #86efac; font-size: 0.75rem; font-weight: 700;
    padding: 4px 12px; border-radius: 99px;
  }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    background: #111827; border: 1px solid #1f2937;
    color: #9ca3af; font-size: 0.75rem;
    padding: 4px 12px; border-radius: 99px;
    cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn:hover { background: #1f2937; color: #f9fafb; border-color: #374151; }

  /* ── Body ────────────────────────────────────────── */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
    align-items: stretch;
  }

  /* ── Phone column ────────────────────────────────── */
  .phone-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    gap: 16px;
    background: #0a0f1a;
    overflow: hidden;
  }

  /* MOBILE frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #0f172a,
      0 0 0 11px rgba(255,255,255,0.06),
      0 50px 100px rgba(0,0,0,0.7);
    background: #000;
    flex-shrink: 0;
  }

  /* WEB frame */
  .web-frame {
    width: min(900px, calc(100% - 80px));
    height: min(640px, calc(100vh - 180px));
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.6);
    background: #1f2937;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .web-chrome {
    height: 36px;
    background: #1f2937;
    border-bottom: 1px solid #374151;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .web-chrome .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .web-chrome .dot-r { background: #ef4444; }
  .web-chrome .dot-y { background: #f59e0b; }
  .web-chrome .dot-g { background: #22c55e; }
  .web-chrome .url {
    flex: 1; background: #111827; border-radius: 4px;
    height: 20px; margin: 0 8px;
    display: flex; align-items: center; padding: 0 10px;
    font-size: 0.68rem; color: #6b7280;
  }

  .device-iframe {
    width: 100%; height: 100%;
    border: none; display: block;
    flex: 1;
  }

  /* Switcher */
  .switcher {
    display: flex; gap: 6px;
    flex-wrap: wrap; justify-content: center;
    max-width: 600px;
  }
  .switcher button {
    height: 28px; padding: 0 10px;
    border-radius: 6px; border: 1px solid #1f2937;
    background: #111827; color: #6b7280;
    font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .switcher button:hover { background: #1f2937; color: #d1d5db; border-color: #374151; }
  .switcher button.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }

  /* ── Resize handle ───────────────────────────────── */
  .resize-handle {
    width: 8px;
    flex-shrink: 0;
    cursor: col-resize;
    position: relative;
    background: transparent;
    z-index: 10;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    left: 3px; top: 0; bottom: 0;
    width: 2px;
    background: #1a2235;
    transition: background 0.15s;
  }
  .resize-handle:hover::after { background: #374151; }
  .resize-handle.dragging::after { background: #3b82f6; }

  /* ── Timeline column ─────────────────────────────── */
  .timeline-col {
    width: 460px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    background: #0d1424;
  }
  .timeline-col.collapsed { width: 0; }

  .timeline-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .timeline-header h2 {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #4b5563;
  }

  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 40px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

  /* ── Timeline line + dots ────────────────────────── */
  /* --lx: horizontal center of the line/dots from .timeline-line left edge */
  .timeline-line {
    --lx: 8px;
    position: relative;
    padding-left: 28px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
  }
  .timeline-line::before {
    content: '';
    position: absolute;
    left: calc(var(--lx) - 1px); /* 2px line centered at --lx */
    top: 10px; bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, #1e3a5f 0%, #1f2937 100%);
    border-radius: 2px;
  }

  .entry {
    position: relative;
    margin-bottom: 10px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: -25px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
    top: 18px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1f2937;
    border: 2px solid #374151;
    z-index: 1;
  }
  .entry.s-critique::before { background: #78350f; border-color: #d97706; }
  .entry.s-improve::before  { background: #1e3a5f; border-color: #3b82f6; }
  .entry.s-validate::before { background: #14532d; border-color: #16a34a; }
  .entry.s-design::before   { background: #312e81; border-color: #6366f1; }

  /* ── Entry cards ─────────────────────────────────── */
  .entry-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: #374151; }

  .entry-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer; user-select: none;
  }
  .entry-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 0.85rem; font-weight: 600; color: #f9fafb;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    line-height: 1.3;
  }
  .entry-desc { font-size: 0.72rem; color: #6b7280; margin-top: 3px; }
  .entry-chevron {
    color: #374151; font-size: 0.6rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .entry.open .entry-chevron { transform: rotate(180deg); color: #6b7280; }

  .verdict {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .verdict-needs { background: #451a03; color: #fb923c; }
  .verdict-worth { background: #14532d; color: #86efac; }
  .verdict-kill  { background: #450a0a; color: #f87171; }
  .escore { font-size: 0.7rem; font-weight: 700; color: #60a5fa; }

  .entry-body {
    display: none;
    border-top: 1px solid #1f2937;
    padding: 14px;
    font-size: 0.76rem; color: #9ca3af; line-height: 1.65;
  }
  .entry.open .entry-body { display: block; }

  .esect { margin-top: 10px; }
  .esect:first-child { margin-top: 0; }
  .esect-label {
    font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #4b5563; margin-bottom: 5px;
  }
  .esect ul { padding-left: 14px; }
  .esect li { margin-bottom: 3px; color: #9ca3af; }
  .esect p { color: #9ca3af; }
  .esect strong { color: #d1d5db; font-weight: 600; }
  .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .etag {
    background: #0a0f1a; border: 1px solid #1f2937;
    border-radius: 4px; padding: 2px 7px;
    font-size: 0.66rem; color: #6b7280;
  }
  .etag.green { border-color: #14532d; color: #86efac; }
  .etag.blue  { border-color: #1e3a5f; color: #60a5fa; }
  a.ext-link { color: #818cf8; text-decoration: none; }
  a.ext-link:hover { text-decoration: underline; }

<script>window.IDEA_DATA = {"ideaNum": 57, "title": "Reflux Receipt", "sub": "A 7-night reflux experiment that turns late-night symptom guesses into a blunt pattern report.", "score": "7/10", "deviceType": "MOBILE", "stitchId": "15243706986659527400", "startScreen": 0, "screens": [{"id": "579203d9a6f6415e9a53186ab76b8106", "label": "Welcome / Safety Framing"}, {"id": "6a8dd68d8fe843069b9dec8a388360d5", "label": "Protocol Setup"}, {"id": "12ba79e4fde5466db28dbc8d8fbadfa2", "label": "Home / Progress Tracker"}, {"id": "4873cf2054d84af1bd5cd87ec8421f9a", "label": "Night Log"}, {"id": "409f4977779f4f4a8421e6383d4be7e2", "label": "Night Logged Confirmation"}, {"id": "4b1d2f8f15b343d8802a6f1860bfa744", "label": "Morning Check-In"}, {"id": "798709f26f304cdf8e0f60d47f2434be", "label": "Findings Preview"}, {"id": "ec7e55c8c37b4b82aae6786ce793a5b5", "label": "Final 7-Night Report"}, {"id": "640bbd79012a496fa309be1424b7bea0", "label": "Report Export / Share"}, {"id": "d3e352da781c4e3ca7856ded34ac84cd", "label": "Settings / Legal / Data"}], "timeline": [{"status": "", "icon": "💡", "title": "Original Idea", "desc": "Reflux Receipt is a health app that copies the Cal AI model but applies it to late-night heartburn anxiety instead of calories.", "body": "<div class=\"esect\"><div class=\"esect-label\">Description</div><ul><li>Reflux Receipt is a health app that copies the Cal AI model but applies it to late-night heartburn anxiety instead of calories. You scan the late-night meal, dessert, drink, or snack you are about to have and enter your rough bedtime, and the app predicts your reflux-risk window based on portion size, acidity, fat, spice, and how soon you plan to lie down. The reveal is instant and screen-recordable: a blunt screen says &#x27;If you eat this now and lie down at 11:15 PM, your highest heartburn risk window is 12:05 AM to 2:10 AM,&#x27; plus one lower-risk swap or bedtime delay so the loop becomes scan, see the damage, change one thing, and sleep better tonight.</li></ul></div>"}, {"status": "critique", "icon": "🔍", "title": "Critique v1", "desc": "Initial concept had a sharp hook but leaned on fake medical precision.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "5/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What&#x27;s Good</div><ul><li>The hook is instantly legible: scan a late-night food, get a blunt consequence, make one change, sleep better tonight.</li><li>It has better emotional specificity than generic nutrition apps because heartburn at night is a real, miserable, immediate problem.</li><li>A stripped-down MVP could be visually compelling and easy to demo if it stays honest and uses rough heuristics instead of fake medical precision.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>The core promise is trying to sound more scientific than it is. &quot;Highest heartburn risk window is 12:05 AM to 2:10 AM&quot; is fake-confidence theater unless you have real clinical backing, user-specific data, and validation. Otherwise it is astrology for acid reflux.</li><li>You are packaging a messy, deeply individual medical issue as if a camera scan can infer causality. Reflux depends on portion, ingredients, timing, body position, alcohol, caffeine, medication, anatomy, pregnancy, obesity, stress, and whether the user even has GERD versus random indigestion. Your app sees maybe 20% of that and then acts smug about the other 80%.</li><li>The &quot;Cal AI for reflux&quot; analogy is weaker than it sounds. Calories are at least anchored to widely understood nutrition data. Reflux triggers are inconsistent, subjective, and personal. A tomato sauce bomb wrecks one person and barely touches another. That makes your reveal less trustworthy and more annoying.</li><li>The product is walking straight into health-liability territory while being built as a vibe-coded solo app. If users treat this as medical guidance and it is wrong, your cute blunt screen becomes a credibility grenade.</li><li>The magic moment depends on food recognition plus portion estimation plus ingredient inference plus a reflux-scoring model. That is already too many brittle layers for a solo builder in a few weeks. If any layer is shaky, the whole reveal feels fake.</li><li>&quot;Screen-recordable&quot; is not retention. It is marketing bait. Why does the user come back after day 1? Because if the answer is just &quot;they eat again,&quot; then congratulations, you built a novelty scanner with no habit loop.</li><li>The suggested intervention is thin. &quot;Swap one thing&quot; or &quot;delay bedtime&quot; is obvious advice, not a moat. Most users already know spicy, fatty late-night food is risky. They do not need AI to tell them nachos plus lying down is a bad idea.</li><li>The app will get punished hardest by edge cases. Homemade meals, mixed dishes, cocktails, takeout containers, dessert platters, and shared plates are exactly the kinds of things people eat late at night, and they are exactly the things image-based inference handles badly.</li><li>The idea sounds clean only because it ignores the ugliest part: building the trigger logic and food-risk mappings into something structured enough to feel reliable. That &quot;content&quot; is not ready. It is a manual taxonomy and scoring job disguised as product vision.</li><li>If you keep the precision language, people will expect proof. If you remove the precision language, the wow factor drops and you are left with &quot;food choices that may cause heartburn,&quot; which is much less exciting and much more commoditized.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — if the MVP drops camera-first magic, avoids medical-grade claims, uses manual food entry plus simple heuristics, and frames itself as a personal risk estimate rather than a real predictor.</li><li>Biggest solo complexity traps: image-based food recognition quality, portion-size inference, building and validating reflux trigger logic, legal/medical wording, retaining users after the first novelty scan, and handling messy mixed-food inputs without the product feeling dumb.</li></ul></div>"}, {"status": "improve", "icon": "✨", "title": "Improved v2", "desc": "The camera-first predictor became a manual trigger tracker with honest risk framing.", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Replaced camera scanning and fake time-window prediction with manual entry, blunt risk bands, and a bedtime slider. This removes the weakest part of the original idea: pretending a solo-built scanner can infer ingredients, portions, and personal reflux causality with medical-looking precision.</li><li>Shifted the product from &quot;universal reflux predictor&quot; to &quot;personal trigger tracker for known nighttime reflux sufferers.&quot; That makes the app honest about uncertainty, lowers health-liability risk, and creates a real learning loop instead of a one-off novelty scan.</li><li>Narrowed the intervention to one actionable recommendation per check: either wait longer before lying down or reduce/remove one high-risk trigger tag. This keeps the product useful in 2-4 weeks and avoids fake optimization theater.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">MVP Scope</div><ul><li>What&#x27;s in v1: onboarding and safety framing, evening food log with fixed trigger tags and bedtime slider, immediate risk band with one intervention, morning symptom check-in, history view, simple pattern summaries after enough logs, and streak or experiment reminders.</li><li>What&#x27;s out of v1: camera scan, image recognition, portion estimation from photos, ingredient extraction, nutrition database integrations, precise time-window prediction, generalized medical advice, clinician sharing, community features, payments, and any feature that depends on user-generated content or network effects.</li><li>Estimated build time with AI coding tools: 2-3 weeks total, including UI build, starter trigger taxonomy and rule-table content prep, intervention copywriting, local data model setup, analytics events, and GitHub/App Store integration setup.</li></ul></div>"}, {"status": "critique", "icon": "🔍", "title": "Critique v2", "desc": "The tracker direction was more buildable, but retention and fake-personalization risk remained.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What&#x27;s Good</div><ul><li>This version finally stopped pretending a solo developer can build credible food vision for a medically messy problem in a few weeks. Cutting the camera was the right move.</li><li>The repositioning is much more honest. &quot;Personal trigger tracker&quot; is a real product category. &quot;Universal reflux predictor&quot; was nonsense.</li><li>The scope is closer to something one person could ship: structured logging, simple rules, and pattern summaries are all boring but buildable.</li><li>The best part is the narrowness. Nighttime reflux for people who already know they have the problem is a sharper wedge than generic gut-health fluff.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>The app is still dangerously close to being a fancy symptom journal with attitude. Users already know late meals, alcohol, spicy food, and lying down are bad. If your &quot;insight&quot; is just repackaged common sense, this dies the second the novelty wears off.</li><li>The entire product lives or dies on manual compliance, and manual compliance in consumer health apps is where good intentions go to die. You need evening logging and morning logging. That is not one habit. That is two habits, at two different times, for a problem people would rather ignore.</li><li>&quot;14-day coach&quot; sounds tidy because it hides the real problem: most users will do this for 2-3 nights, get busy, and disappear. Your retention story is still mostly a sentence, not proof. Why does the user come back after day 1? Because if the answer is &quot;to keep journaling,&quot; that is weak.</li><li>The first-session value is flimsy. Before personal data exists, the app is just a rules table with a nicer tone. &quot;Caution if you lie down within 2 hours&quot; is not a magic moment. It is your app telling adults what every reflux article already says for free.</li><li>The pattern engine can easily become fake personalization theater. &quot;3 of the last 4 times tomato + bed within 90 minutes caused symptoms&quot; sounds smart, but with tiny sample sizes and tons of confounders, it can also be statistical cosplay.</li><li>Health-liability risk did not disappear just because the copy got softer. The moment you show risk bands and recommend behavior changes around symptoms, some users will read authority into it. If the onboarding and safety framing are weak, the product still looks like low-rent medical advice.</li><li>The content work is not trivial, and the pitch keeps understating that. Trigger taxonomy, wording, severity scales, interventions, pattern thresholds, confidence language, notification copy, and safety disclaimers are not filler. That is a significant chunk of the MVP.</li><li>The market is awkward. Serious reflux sufferers may want doctor-backed guidance, not a vibe-coded app. Casual sufferers may not care enough to log. You are targeting the narrow band of people miserable enough to want help but not so serious that they demand clinical credibility.</li><li>The idea claims honesty, but the &quot;experiment&quot; framing can still overpromise. If the app starts nudging users with &quot;try this tonight&quot; based on weak data, it risks sounding smarter than it is all over again.</li><li>This is not a moat. At best it is a well-packaged micro-journal with better copy. That can still be worth shipping, but do not confuse &quot;possible MVP&quot; with &quot;strong business.&quot;</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the mechanics are simple enough, but only if the builder resists adding fake intelligence, keeps the data model tiny, and accepts that content design and safety copy are real work, not garnish.</li><li>Biggest solo complexity traps: dual-habit retention, legal/safety wording, overfitting thin personal data into bogus insights, expanding trigger tags into a pseudo-nutrition database, notification timing, and spending too long polishing a journaling app that users may abandon by night three.</li></ul></div>"}, {"status": "improve", "icon": "✨", "title": "Improved v3", "desc": "The product became a finite 7-night reflux experiment with evidence-gated findings.", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Replaced the open-ended &quot;coach&quot; with a strict 7-night reflux experiment. This fixes the retention and honesty problem: a short protocol is more believable than an ongoing journaling habit, and it gives users a clear finish line instead of vague self-improvement.</li><li>Removed the instant risk band and any predictive language from v1. This directly addresses the critique that early value was just common-sense advice wearing medical-looking confidence; v1 now focuses on structured evidence capture and only shows findings after enough completed nights.</li><li>Shrunk the data model to the minimum useful variables and made the output a completion report, not fake personalization. This reduces manual burden, avoids thin-data overfitting, includes the real content-design work in scope, and makes the product shippable by one person in 2-4 weeks.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">MVP Scope</div><ul><li>What&#x27;s in v1: safety-first onboarding, 7-night protocol setup, nightly log with fixed tags and defaults, morning symptom check-in, reminder scheduling, progress countdown, evidence-gated findings after enough nights, final 7-night summary report, and export/share of the summary as plain text or PDF.</li><li>What&#x27;s out of v1: instant risk bands, predictive scores, camera scan, image recognition, nutrition database integrations, ongoing coaching, community or UGC, clinician dashboard, medication tracking, wearable integrations, payments, and anything that depends on network effects, moderation, or partnerships.</li><li>Estimated build time with AI coding tools: 2.5-3.5 weeks total, including UI build, local storage and reminder integration setup, export generation, trigger taxonomy definition, confidence-threshold rules, severity scale design, onboarding and safety copy, notification copy, and report-template content prep.</li></ul></div>"}, {"status": "critique", "icon": "🔍", "title": "Critique v3", "desc": "The one-week utility shape finally looked honest enough to ship and test.", "verdict": "WORTH BUILDING", "verdictClass": "worth", "score": "7/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What&#x27;s Good</div><ul><li>This is the first version that stops cosplaying as medical AI and starts acting like a small, honest utility.</li><li>The 7-night protocol is a real scope cut, not fake simplification. A solo developer can plausibly ship this if they keep it local-first and boring.</li><li>Gating conclusions until enough nights are logged is the right call. At least now the app admits that thin data is thin data.</li><li>The final report is a better product shape than an endless &quot;coach.&quot; A finite deliverable is more believable than habit-app theater.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>You did not solve retention. You downgraded the problem from &quot;daily habit app&quot; to &quot;one-week utility,&quot; which is smarter, but it still means the business is UNVERIFIED.</li><li>Seven nights still asks for two behaviors at two different times of day. That is compliance tax, not convenience. People with reflux already procrastinate on behavior change; now you want them to log it twice.</li><li>Your &quot;weak signal&quot; logic is still flirting with numerology. Five to seven nights is barely enough to say anything clean when portion size, stress, medication, meal composition, and bedtime timing all move together.</li><li>The tiny trigger taxonomy is good for scope and bad for truth. The minute a user&#x27;s obvious trigger is missing, the app looks simplistic instead of focused.</li><li>&quot;Useful for doctor conversations&quot; is optimistic marketing. Most doctors are not waiting for a vibe-coded PDF unless it is extremely clean, concise, and clearly better than a patient saying &quot;late meals seem bad.&quot;</li><li>The product still risks feeling like premium common sense. &quot;Eat earlier, lie down later, avoid obvious triggers&quot; is not a breakthrough. If the report mostly confirms what users already suspect, they will not care enough to repeat the protocol.</li><li>Safety framing is still a real product surface, not a disclaimer you sprinkle on top. If the app sounds too cautious, it feels empty. If it sounds too confident, it sounds medically shady.</li><li>Reminders are not trivial glue work. Notification permissions, missed nights, timezone quirks, and inconsistent morning behavior can easily wreck the clean protocol experience.</li><li>Export and PDF are classic solo-dev trap features. They sound small, but they invite polish work that does nothing to prove demand.</li><li>The moat is still weak. This is a specialized compliance wrapper around a symptom diary, not some defensible engine.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Solo Dev</div><ul><li>Can one person ship this in 2-4 weeks with AI coding tools? MAYBE — the core tracker is small enough, but only if the builder resists overbuilding reminders, export, and pseudo-insight logic.</li><li>Biggest solo complexity traps: notification reliability, missed-night recovery logic, thin-data threshold rules, health/safety wording, App Store review risk if claims sound medical, report/export polish creep, and taxonomy expansion into a fake nutrition project.</li></ul></div>"}, {"status": "validate", "icon": "✅", "title": "Validated", "desc": "The final concept cleared the critique gate and locked in the screen list.", "body": "<div class=\"esect\"><div class=\"esect-label\">Score</div><ul><li>7/10 final critique score</li><li>WORTH BUILDING verdict on April 3, 2026</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff</div><ul><li>Welcome / Safety Framing</li><li>Protocol Setup</li><li>Home / Progress Tracker</li><li>Night Log</li><li>Night Logged Confirmation</li><li>Morning Check-In</li><li>Findings Preview</li><li>Final 7-Night Report</li><li>Report Export / Share</li><li>Settings / Legal / Data</li></ul></div>"}, {"status": "design", "icon": "🎨", "title": "Designed", "desc": "Stitch screens were generated and assembled into a clickable mobile prototype.", "body": "<div class=\"esect\"><div class=\"esect-label\">Stitch Project</div><p><a class=\"ext-link\" href=\"https://stitch.withgoogle.com/projects/15243706986659527400\" target=\"_blank\" rel=\"noreferrer\">15243706986659527400</a></p></div><div class=\"esect\"><div class=\"esect-label\">Prototype</div><p><a class=\"ext-link\" href=\"https://jakebuild.github.io/idea-factory/57-reflux-receipt-is-a-health-app/\" target=\"_blank\" rel=\"noreferrer\">Live preview</a></p></div><div class=\"esect\"><div class=\"esect-label\">Device</div><p>Mobile prototype with a single framed app preview.</p></div>"}]};</script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="idea-num" id="hNum"></span>
    <div>
      <div class="idea-title" id="hTitle"></div>
      <div class="idea-sub" id="hSub"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="score-pill" id="hScore"></span>
    <span class="badge" id="hBadge"></span>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleTimeline()">
      <span id="toggleIcon">›</span>
      <span id="toggleLabel">Hide Journey</span>
    </button>
  </div>
</div>

<div class="body">
  <div class="phone-col" id="phoneCol">
    <div id="deviceFrame"></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="timeline-col" id="timelineCol">
    <div class="timeline-header"><h2>Idea Journey</h2></div>
    <div class="timeline-scroll">
      <div class="timeline-line" id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
