<script>window.IDEA_DATA = {"ideaNum": 70, "title": "VoiceMirror", "sub": "Behavioral interview rehearsal with critique-first story drilling.", "score": "6/10", "deviceType": "MOBILE", "stitchId": "11622282090316163390", "startScreen": 0, "screens": [{"id": "2da8a59e20e8447981a55a4605b8c1c8", "label": "Landing Page"}, {"id": "0e575df695a8414a85e4b455f7887d3e", "label": "Session History"}], "timeline": [{"status": "design", "icon": "💡", "title": "Original Idea", "desc": "Voice cloning concept for career rehearsal.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "5/10", "body": "<div class=\"esect\"><div class=\"esect-label\">Description</div><p>VoiceMirror is a career anxiety app that copies the ElevenLabs model but applies it to self-rehearsal instead of content creation. You record an interview answer, pitch, difficult conversation opener, or toast, and the app generates a better version in your own voice that sounds calmer, clearer, and more confident. The reveal is immediate and screen-recordable: you hear your own voice say the exact same thought better than you could, then see the two phrasing and pacing changes that made the difference. The loop is record, hear your upgraded version, shadow it, retry, and come back before every high-stakes conversation because the product turns vague communication advice into an audible before-and-after.</p></div>"}, {"status": "critique", "icon": "🧨", "title": "Critique v1.1", "desc": "Trust, scope, privacy, and moat problems surfaced immediately.", "verdict": "NEEDS MAJOR WORK", "verdictClass": "needs", "score": "5/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What's Actually Good</div><ul><li>The before-and-after audio reveal is a genuinely strong hook. Hearing your own voice sound better is more visceral than reading generic communication tips.</li><li>The use case is concrete enough to understand immediately: interviews, pitches, hard conversations, and toasts are all emotionally loaded moments where people will pay for relief.</li><li>The product has a built-in demo mechanic because the output is inherently shareable and screen-recordable.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Brutal Feedback</div><ul><li>Your whole pitch is basically \"what if I shipped a smaller ElevenLabs-powered miracle for anxious professionals\" and that is not a product strategy. That is a dependency disguised as an idea.</li><li>The core differentiator is UNVERIFIED. Can you reliably generate \"the same thought, in the same person's voice, but calmer, clearer, and more confident\" with low latency, low cost, and consistently non-creepy output using an external API? If not, the product collapses into a mediocre speaking coach with extra steps.</li><li>Voice cloning is not a cute implementation detail here. It is the entire magic trick. If the clone sounds even slightly off, users stop thinking \"wow, that's me but better\" and start thinking \"weird robot wearing my skin.\"</li><li>You are stacking multiple hard problems and pretending they are one feature: speech-to-text, answer rewriting, style-preserving editing, TTS voice matching, pacing control, audio playback UX, and practice loop feedback. That is not a simple app. That is a chain of failure points.</li><li>The retention story is hand-wavy. Why does the user come back after day 1? Most people only rehearse right before a stressful event. That is episodic utility, not habit. Episodic products can work, but then pricing, acquisition, and urgency positioning have to be extremely sharp. None of that is addressed.</li><li>\"Career anxiety app\" is mushy positioning. The actual behavior is rehearsal. Anxiety is the emotion, not the job to be done. If you market the wrong layer, you get vague interest instead of urgent use.</li><li>The promise \"same thought better than you could\" is dangerous because users may not want their meaning rewritten. In interviews and difficult conversations, wording changes can alter intent, authenticity, or even factual accuracy. One bad rewrite and trust is dead.</li><li>The phrase \"copies the ElevenLabs model\" is a red flag, not a flex. It implies the moat belongs to someone else and you are building a thin wrapper around rented intelligence.</li><li>Cost structure could get ugly fast. Audio in, transcription, LLM rewrite, voice synthesis, maybe multiple retries per session. If users practice repeatedly before high-stakes events, your most engaged users become your least profitable users unless pricing is carefully engineered.</li><li>Privacy concerns are not optional here. People will rehearse layoffs, salary asks, conflicts with managers, and interview answers. That is sensitive voice data and sensitive text. If your privacy story is weak, adoption dies in any serious professional setting.</li><li>The \"two phrasing and pacing changes that made the difference\" sounds neat in a pitch and suspicious in practice. Why exactly two? If the explanation layer feels arbitrary or fake, it becomes garnish pasted on top of an expensive audio generation pipeline.</li><li>There is a real risk the product teaches imitation instead of communication. Users may chase a polished synthetic version they cannot naturally reproduce, which turns the app into a confidence-destroying comparison machine.</li><li>Screen-recordable virality is overrated here. A lot of users will not want to publicly share a fake-better version of their own nervous speaking. The use case is intimate and slightly embarrassing, which is terrible fuel for viral loops.</li><li>You have no wedge beyond \"this output feels amazing.\" That is not enough if latency is slow, voice quality is inconsistent, onboarding requires voice training, or users only need it a few times per year.</li></ul></div>"}, {"status": "improve", "icon": "🛠️", "title": "Improved Idea v2", "desc": "Narrowed to interview rehearsal and removed cloned voice from MVP.", "verdict": "WORTH BUILDING", "verdictClass": "worth", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Cut cloned voice from v1 entirely and repositioned the product as interview rehearsal software, not a general \"career anxiety app.\" This removes the biggest technical and trust risk the critique identified, makes the value proposition clearer, and keeps the MVP useful without depending on a fragile external magic trick.</li><li>Narrowed the wedge to job interviews and built around a concrete workflow: pick interview type, practice with a curated question pack, get a meaning-safe rewrite plus delivery feedback, then retry. This is better because it creates a measurable job to be done, simpler onboarding, and clearer acquisition than trying to serve interviews, pitches, toasts, and hard conversations at once.</li><li>Added an authenticity control, weak-answer tracking, and a 7-day interview prep plan instead of vague \"hear yourself better\" polish. This fixes the trust problem, gives users a reason to come back in week 2, and turns the product into a repeatable rehearsal tool rather than a one-time demo.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Improved Description</div><p>VoiceMirror v2 is an interview rehearsal app for job seekers who have a real interview coming up in the next 1-14 days. The user starts by choosing a scenario such as recruiter screen, hiring manager interview, behavioral interview, or salary conversation. The app gives them a small curated pack of common questions for that scenario, lets them record or type an answer, transcribes it, and returns three things: a cleaned-up version of their answer, a delivery review with concrete flags like filler words, rambling, or weak opening, and a retry prompt that tells them exactly what to improve on the next take.</p><p>The key trust mechanic is authenticity control. Before generating revisions, the user chooses one mode: preserve wording, preserve meaning, or rewrite more directly. That makes the product safer for interviews, where wording changes can distort intent. Instead of claiming \"this is you but better,\" the product says \"this is the same answer, made easier to deliver under pressure.\" The output is text-first and practice-first: transcript diff, highlighted pacing breaks, and a shadow-practice view that lets the user rehearse the improved answer in their own real voice.</p><p>The retention story is not daily habit; it is interview-cycle repetition. Users come back in week 2 because the app saves weak questions, generates a short daily drill list from past misses, and counts down to the interview date with a focused prep plan. A user preparing across multiple rounds can return to the same question bank, compare takes, and see whether they are improving on clarity, length, and confidence markers. That is episodic, but still strong enough if the product is framed and priced around upcoming high-stakes interviews rather than generic self-improvement.</p><p>This is viable for a solo builder because the MVP only needs recording, transcription, structured rewrite prompts, basic speech metrics, saved sessions, and a small manually curated question library. No voice cloning, no social loop, no user-generated marketplace, no moderation, and no payments/payouts in v1.</p></div>"}, {"status": "improve", "icon": "🎯", "title": "Improved Idea v3", "desc": "Shifted to critique-first behavioral drills with reusable Story Cards.", "verdict": "WORTH BUILDING", "verdictClass": "worth", "score": "6/10", "body": "<div class=\"esect\"><div class=\"esect-label\">What Changed</div><ul><li>Narrowed the product to behavioral interviews only and replaced broad \"question packs\" with a fixed story-bank workflow. This addresses the critique's scope and trust problems: one wedge is easier to explain, the content can be curated well by one person, and users are solving a real interview problem instead of browsing generic AI coaching.</li><li>Flipped the core UX from rewrite-first to critique-first. The app now diagnoses missing proof, weak structure, and overlong answers before offering an optional outline rewrite. This is better because it avoids the \"bullshitting machine\" failure mode and gives value even for users who want diagnosis but do not want AI to write for them.</li><li>Replaced the fake 7-day countdown plan with repeatable follow-up drills tied to the user's own story bank. This makes week-2 retention more credible: users come back to pressure-test the same stories from new angles, not to click through generic reminders.</li></ul></div><div class=\"esect\"><div class=\"esect-label\">Improved Description</div><p>VoiceMirror v3 is a behavioral interview drill app for job seekers who need better, more defensible stories for STAR-style questions. The user records or types an answer to a behavioral prompt like \"Tell me about a time you disagreed with a teammate.\" The app transcribes it and returns a strict diagnosis first: which STAR parts are missing, where the answer is too long, whether it lacks evidence like numbers or concrete actions, and one sentence on why that issue matters in an interview. There is no fake-smart personality scoring, no \"confidence markers,\" and no cloned voice.</p><p>After diagnosis, the app builds a reusable Story Card from the answer: situation, task, action, result, proof points, and likely follow-up questions. The user can edit the card themselves. Only then can they opt into AI help, and that help is constrained: the default output is a tighter outline or bullet structure, not a polished script. A full rewrite is optional and clearly labeled as a draft to edit, not something to memorize blindly. This directly addresses the trust problem because the product's main job is to help users defend what they actually did, not generate prettier claims.</p><p>The real loop is story-bank rehearsal, not one-off rewriting. A small curated content set maps 25 behavioral interview questions into 8 story themes such as conflict, failure, ownership, prioritization, leadership, ambiguity, feedback, and impact. Once a user practices one story, the app serves new prompts and follow-ups that reuse that same evidence from different angles. That is the core value versus pasting a transcript into ChatGPT: faster reps, consistent structure checks, and side-by-side improvement on the same story across multiple questions in one session.</p><p>Why would users come back in week 2? Because they are no longer practicing isolated questions; they are building a compact interview story bank they can reuse across second-round and panel interviews. In week 2, the app can say: \"Your conflict story still has no measurable result\" or \"You still freeze on follow-up probes about tradeoffs,\" then assign three short drills against that exact weakness. That is still episodic, but it is a stronger retention mechanic than a countdown timer and honest about the product's prep-sprint nature.</p><p>Privacy in v1 is handled with a local-first posture: transcripts, Story Cards, and session history are stored on-device by default, raw audio is sent only for transcription and not retained after processing, and users can delete a session or wipe all data in one action. The first paid offer, if tested, should be a one-time behavioral interview sprint rather than a recurring subscription.</p></div><div class=\"esect\"><div class=\"esect-label\">Design Handoff</div><ul><li>Screen 1: Landing page — explain the product as behavioral interview rehearsal, show the critique-first workflow, privacy stance, and CTA to start a sprint.</li><li>Screen 2: Sprint setup — collect interview date, target role, and current confidence level; explain that v1 focuses on behavioral interviews only.</li><li>Screen 3: Story bank dashboard — show the user's story themes, missing proof points, next recommended drill, and recent practice activity.</li><li>Screen 4: Question drill screen — present one behavioral question, optional context, recording controls, typed-answer option, timer, and submit action.</li><li>Screen 5: Processing state — show transcription/analyzing progress and set expectations for what feedback will appear.</li><li>Screen 6: Answer diagnosis — show transcript, objective checks with short explanations, missing STAR sections, answer length, evidence gaps, and CTA to build/update a Story Card.</li><li>Screen 7: Story Card editor — let the user edit situation, task, actions, result, proof points, and notes; show mapped follow-up probes.</li><li>Screen 8: Optional rewrite view — show a tighter outline or draft answer derived from the Story Card, with a warning that the user should edit for truth and voice.</li><li>Screen 9: Follow-up drill screen — ask tougher variants and probe questions against the same Story Card, then let the user retry immediately.</li><li>Screen 10: Retry comparison — compare two takes on the same story with transcript snippets, duration, missing-section changes, and evidence improvements.</li><li>Screen 11: Session history — list past drills, linked Story Cards, timestamps, and resume actions.</li><li>Screen 12: Privacy and data controls — explain local storage, temporary audio processing, delete-session, and delete-all controls.</li></ul></div>"}]};</script>
<style>

  body {

    flex-shrink: 0;
  }

  }

    display: flex;
    flex: 1;
    overflow: hidden;
    align-items: stretch;
  }

  /* ── Phone column ────────────────────────────────── */
  .phone-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 40px;
    gap: 16px;
    background: #0a0f1a;
    overflow: hidden;
  }

  /* MOBILE frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 48px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #0f172a,
      0 0 0 11px rgba(255,255,255,0.06),
      0 50px 100px rgba(0,0,0,0.7);
    background: #000;
    flex-shrink: 0;
  }

  /* WEB frame */
  .web-frame {
    width: min(900px, calc(100% - 80px));
    height: min(640px, calc(100vh - 180px));
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 24px 60px rgba(0,0,0,0.6);

    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

    height: 36px;
    background: #1f2937;

    flex-shrink: 0;
  }

  }

  .web-chrome .dot-y { background: #f59e0b; }
  .web-chrome .dot-g { background: #22c55e; }

  }

  /* Switcher */

  /* ── Resize handle ───────────────────────────────── */
  .resize-handle {
    width: 8px;

    background: transparent;
    z-index: 10;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    left: 3px; top: 0; bottom: 0;
    width: 2px;
    background: #1a2235;
    transition: background 0.15s;
  }
  .resize-handle:hover::after { background: #374151; }
  .resize-handle.dragging::after { background: #3b82f6; }

  /* ── Timeline column ─────────────────────────────── */
  .timeline-col {
    width: 460px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;

  }
  .timeline-col.collapsed { width: 0; }

  .timeline-header {
    padding: 20px 28px 14px;
    border-bottom: 1px solid #1a2235;
    flex-shrink: 0;
  }
  .timeline-header h2 {
    font-size: 0.68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #4b5563;
  }

  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 18px 28px 40px;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 2px; }

  /* ── Timeline line + dots ────────────────────────── */
  /* --lx: horizontal center of the line/dots from .timeline-line left edge */
  .timeline-line {
    --lx: 8px;
    position: relative;
    padding-left: 28px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
  }
  .timeline-line::before {
    content: '';
    position: absolute;
    left: calc(var(--lx) - 1px); /* 2px line centered at --lx */
    top: 10px; bottom: 10px;
    width: 2px;
    background: linear-gradient(to bottom, #1e3a5f 0%, #1f2937 100%);
    border-radius: 2px;
  }

  .entry {
    position: relative;
    margin-bottom: 10px;
  }
  .entry::before {
    content: '';
    position: absolute;
    left: -25px; /* dot center = 28 - 25 + 5 = 8px = --lx ✓ */
    top: 18px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #1f2937;
    border: 2px solid #374151;
    z-index: 1;
  }
  .entry.s-critique::before { background: #78350f; border-color: #d97706; }
  .entry.s-improve::before  { background: #1e3a5f; border-color: #3b82f6; }
  .entry.s-validate::before { background: #14532d; border-color: #16a34a; }
  .entry.s-design::before   { background: #312e81; border-color: #6366f1; }

  /* ── Entry cards ─────────────────────────────────── */
  .entry-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .entry-card:hover { border-color: #374151; }

  .entry-head {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer; user-select: none;
  }
  .entry-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-title {
    font-size: 0.85rem; font-weight: 600; color: #f9fafb;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    line-height: 1.3;
  }
  .entry-desc { font-size: 0.72rem; color: #6b7280; margin-top: 3px; }
  .entry-chevron {
    color: #374151; font-size: 0.6rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  .entry.open .entry-chevron { transform: rotate(180deg); color: #6b7280; }

  .verdict {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .verdict-needs { background: #451a03; color: #fb923c; }
  .verdict-worth { background: #14532d; color: #86efac; }
  .verdict-kill  { background: #450a0a; color: #f87171; }
  .escore { font-size: 0.7rem; font-weight: 700; color: #60a5fa; }

  .entry-body {
    display: none;
    border-top: 1px solid #1f2937;
    padding: 14px;
    font-size: 0.76rem; color: #9ca3af; line-height: 1.65;
  }
  .entry.open .entry-body { display: block; }

  .esect { margin-top: 10px; }
  .esect:first-child { margin-top: 0; }
  .esect-label {
    font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #4b5563; margin-bottom: 5px;
  }
  .esect ul { padding-left: 14px; }

</style>

<script>
// ── Render from IDEA_DATA ────────────────────────────
(function () {
  const D = window.IDEA_DATA || {};
  const isMobile = (D.deviceType || 'MOBILE').toUpperCase() !== 'WEB';

  // Header
  document.title = 'Idea #' + D.ideaNum + ' — ' + D.title;
  document.getElementById('hNum').textContent   = '#' + D.ideaNum;
  document.getElementById('hTitle').textContent = D.title;
  document.getElementById('hSub').textContent   = D.sub || '';
  document.getElementById('hScore').textContent = D.score || '';
  document.getElementById('hBadge').textContent = isMobile ? '📱 Mobile Prototype' : '💻 Web Prototype';

  // Device frame
  const frameContainer = document.getElementById('deviceFrame');
  if (isMobile) {
    frameContainer.className = 'phone-frame';
    frameContainer.innerHTML = '<iframe id="app" class="device-iframe"></iframe>';
  } else {
    frameContainer.className = 'web-frame';
    frameContainer.innerHTML =
      '<div class="web-chrome">' +
        '<div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>' +
        '<div class="url" id="webUrl">preview</div>' +
      '</div>' +
      '<iframe id="app" class="device-iframe"></iframe>';
  }

  // Screens switcher
  const screens = D.screens || [];
  const startIdx = D.startScreen != null ? D.startScreen : (screens.length > 1 ? 1 : 0);
  const switcher = document.getElementById('switcher');
  const iframe   = document.getElementById('app');

  function hideIframeScrollbars() {
    try {
      const style = iframe.contentDocument.createElement('style');
      style.textContent = '::-webkit-scrollbar{display:none}*{-ms-overflow-style:none!important;scrollbar-width:none!important}';
      iframe.contentDocument.head.appendChild(style);
    } catch(e) {}
  }
  iframe.addEventListener('load', hideIframeScrollbars);

  function goTo(i) {
    iframe.src = screens[i].id + '.html';
    switcher.querySelectorAll('button').forEach((b, j) => b.classList.toggle('active', j === i));
    const urlEl = document.getElementById('webUrl');
    if (urlEl) urlEl.textContent = screens[i].label;
  }

  screens.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.textContent = (i + 1) + ' · ' + s.label;
    btn.onclick = () => goTo(i);
    switcher.appendChild(btn);
  });

  if (screens.length) goTo(startIdx);

  // Timeline
  const timeline = document.getElementById('timeline');
  (D.timeline || []).forEach(e => {
    const verdictHtml = e.verdict
      ? '<span class="verdict verdict-' + (e.verdictClass || 'needs') + '">' + e.verdict + '</span>'
      : '';
    const scoreHtml = e.score
      ? '<span class="escore">' + e.score + '</span>'
      : '';

    const div = document.createElement('div');
    div.className = 'entry' + (e.status ? ' s-' + e.status : '');
    div.innerHTML =
      '<div class="entry-card">' +
        '<div class="entry-head" onclick="this.closest(\'.entry\').classList.toggle(\'open\')">' +
          '<span class="entry-icon">' + e.icon + '</span>' +
          '<div class="entry-info">' +
            '<div class="entry-title">' + e.title + ' ' + verdictHtml + ' ' + scoreHtml + '</div>' +
            '<div class="entry-desc">' + e.desc + '</div>' +
          '</div>' +
          '<span class="entry-chevron">▼</span>' +
        '</div>' +
        '<div class="entry-body">' + (e.body || '') + '</div>' +
      '</div>';
    timeline.appendChild(div);
  });

  // Timeline toggle
  let open = true;
  window.toggleTimeline = function () {
    open = !open;
    document.getElementById('timelineCol').classList.toggle('collapsed', !open);
    document.getElementById('resizeHandle').style.display = open ? '' : 'none';
    document.getElementById('toggleIcon').textContent  = open ? '›' : '‹';
    document.getElementById('toggleLabel').textContent = open ? 'Hide Journey' : 'Show Journey';
  };

  // Drag resize
  const handle      = document.getElementById('resizeHandle');
  const timelineCol = document.getElementById('timelineCol');
  let resizing = false, rx = 0, rw = 0;

  handle.addEventListener('mousedown', e => {
    if (!open) return;
    resizing = true; rx = e.clientX; rw = timelineCol.offsetWidth;
    handle.classList.add('dragging');
    timelineCol.style.transition = 'none';
    document.documentElement.style.cssText += ';cursor:col-resize!important;user-select:none!important';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!resizing) return;
    const w = Math.max(280, Math.min(window.innerWidth - 500, rw + (rx - e.clientX)));
    timelineCol.style.width = w + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    handle.classList.remove('dragging');
    timelineCol.style.transition = '';
    document.documentElement.style.cursor = '';
    document.documentElement.style.userSelect = '';
  });
})();
</script>
</body>
</html>
