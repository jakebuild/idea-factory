<main class="relative h-screen w-full flex flex-col items-center justify-between celestial-bg px-8 py-16">

<header class="z-10 text-center">
<span class="font-label text-sm italic text-on-surface-variant tracking-widest opacity-80">
                An example week

</header>
<!-- Star Map Visualization -->
<div class="relative w-full max-w-md aspect-square flex items-center justify-center">
<!-- Decorative Subtle Noise/Grain -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCzVcgiG3ImCL96xloE3Rh0bXac_LFlwG5Yzh-oMoHfIXsaDSE-NsUmjBj6YA5N1GiEA-F8Eyk4JMXE5-moqWeP2-uvZCXuyiVfcckM-w8hjQswVHqlYPer_VKnBuWsc1Mb02peD5SYHiM0yLlhEcoo2Uq4xxI-KpPHVVxRXN09b9oNRU3fEt6TeyBfmcEm69riuiYv5e2Vu7MFFJpgPqSeulnN1Rd1XmRHAcbrjQCETx8yto_gBj6I_rMymqjlzRtb1XEbomUO2MY');"></div>
<!-- Constellation Container -->
<div class="relative w-72 h-72">
<!-- SVG for Connecting Lines -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 300 300">
<defs>
<lineargradient id="lineGrad" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#9ccee4" stop-opacity="0"></stop>
<stop offset="50%" stop-color="#9ccee4" stop-opacity="0.3"></stop>
<stop offset="100%" stop-color="#9ccee4" stop-opacity="0"></stop>
</lineargradient>
</defs>
<!-- Path connecting stars -->
<path d="M 50 80 L 120 40 L 220 70 L 260 150 L 180 220 L 100 240 L 40 180 Z" fill="none" stroke="url(#lineGrad)" stroke-width="1"></path>
<line stroke="url(#lineGrad)" stroke-dasharray="4 4" stroke-width="0.5" x1="120" x2="180" y1="40" y2="220"></line>
</svg>
<!-- Individual Stars (The "Celestial Observer" Star Markers) -->
<!-- Star 1 -->
<div class="absolute top-[80px] left-[50px] group">
<div class="absolute -inset-4 rounded-full bg-primary/5 animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-on-background star-glow relative z-10"></div>
</div>
<!-- Star 2 -->
<div class="absolute top-[40px] left-[120px]">
<div class="absolute -inset-6 rounded-full bg-primary/10"></div>
<div class="w-3 h-3 rounded-full bg-primary-fixed star-glow relative z-10"></div>
</div>
<!-- Star 3 -->
<div class="absolute top-[70px] left-[220px]">

</div>

<p class="font-body text-on-surface-variant leading-relaxed px-4">
