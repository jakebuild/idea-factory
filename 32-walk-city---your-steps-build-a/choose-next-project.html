<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=390, initial-scale=1.0"/>
  <title>Choose Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --bg: #f5f7f9;
    --surface: #ffffff;
    --surface-soft: #eef1f3;
    --ink: #17332b;
    --muted: #5f6b66;
    --line: rgba(23, 51, 43, 0.08);
    --green: #0b7a58;
    --green-2: #43c58b;
    --green-soft: rgba(67, 197, 139, 0.18);
    --red-soft: rgba(179, 27, 37, 0.12);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; background: linear-gradient(180deg, #f8fbfa 0%, #eef3f1 100%); color: var(--ink); min-height: 100vh; }
  .app { min-height: 100vh; display: flex; flex-direction: column; }
  .status { height: 44px; display:flex; align-items:flex-end; justify-content:space-between; padding: 0 20px 10px; font: 700 14px "Lexend", sans-serif; }
  .signals { font: 600 12px "Plus Jakarta Sans", sans-serif; color: var(--muted); }
  .header { height: 64px; display:flex; align-items:center; justify-content:space-between; padding: 0 18px; background: rgba(255,255,255,0.75); backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); }
  .header-left { display:flex; align-items:center; gap: 10px; min-width: 0; }
  .back-btn, .icon-btn { width: 36px; height: 36px; border-radius: 999px; border: 0; background: var(--surface-soft); color: var(--ink); font-size: 18px; }
  .title-wrap { min-width: 0; }
  .screen-title { font: 700 18px/1.2 "Lexend", sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .screen-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  main { flex: 1; padding: 18px 18px 110px; display:flex; flex-direction:column; gap: 14px; }
  .hero-card, .panel, .notice { border-radius: 28px; }
  .hero-card { padding: 20px; background: linear-gradient(145deg, #0b7a58 0%, #5fe0a4 100%); color: white; box-shadow: 0 20px 40px rgba(11,122,88,0.18); }
  .hero-card h2 { margin: 6px 0; font: 700 28px/1.1 "Lexend", sans-serif; }
  .hero-card p { margin: 0; color: rgba(255,255,255,0.85); font-size: 14px; line-height: 1.5; }
  .eyebrow { text-transform: uppercase; letter-spacing: .08em; font: 700 11px/1 "Lexend", sans-serif; opacity: .82; }
  .progress { display:flex; align-items:center; justify-content:space-between; gap: 14px; }
  .ring { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.16); display:grid; place-items:center; font: 800 20px/1 "Lexend", sans-serif; }
  .panel { background: rgba(255,255,255,0.92); padding: 18px; box-shadow: 0 12px 32px rgba(20,40,34,0.08); }
  .section-head { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-bottom: 10px; font: 700 14px/1.2 "Lexend", sans-serif; }
  .body-copy { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
  .pill { display:inline-flex; align-items:center; padding: 6px 10px; border-radius: 999px; background: var(--surface-soft); color: var(--muted); font-size: 11px; font-weight: 700; }
  .pill.success { background: var(--green-soft); color: var(--green); }
  .primary-btn, .ghost-btn, .select-card, .project-option, .linkish { cursor:pointer; }
  .primary-btn, .ghost-btn { width: 100%; border: 0; border-radius: 999px; padding: 16px 18px; font: 700 15px/1 "Lexend", sans-serif; }
  .primary-btn { background: linear-gradient(135deg, var(--green) 0%, var(--green-2) 100%); color: white; box-shadow: 0 18px 32px rgba(11,122,88,0.18); }
  .ghost-btn { background: var(--surface-soft); color: var(--ink); }
  .linkish { border:0; padding:0; background:none; color: var(--green); font: 700 12px/1 "Lexend", sans-serif; }
  .city-grid, .option-grid, .project-list { display:grid; gap: 12px; }
  .city-grid { grid-template-columns: 1fr 1fr; }
  .mini-card, .select-card, .project-option { border: 1px solid var(--line); background: linear-gradient(180deg, #ffffff 0%, #f6faf8 100%); border-radius: 24px; padding: 16px; text-align:left; }
  .mini-card strong, .select-card strong, .project-option strong, .build-card strong { display:block; font: 700 16px/1.2 "Lexend", sans-serif; margin-bottom: 6px; }
  .mini-card span, .select-card span, .project-option span, .build-card span { color: var(--muted); font-size: 13px; line-height: 1.4; display:block; }
  .select-card.secondary { background: linear-gradient(180deg, #f7f8fb 0%, #eef3f7 100%); }
  .mini-card.done { background: linear-gradient(180deg, #ffffff 0%, #ecfbf4 100%); }
  .mini-card.live { background: linear-gradient(180deg, #ffffff 0%, #edf7ff 100%); }
  .notice { padding: 16px 18px; background: rgba(255,255,255,0.86); color: var(--muted); font-size: 13px; line-height: 1.5; }
  .notice.danger { background: var(--red-soft); color: #8d2730; }
  .split { display:flex; align-items:center; justify-content:space-between; gap: 14px; }
  .status-strip { border-radius: 999px; background: rgba(255,255,255,0.86); padding: 12px 16px; font-size: 13px; color: var(--muted); display:flex; align-items:center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.success { background: var(--green); }
  .metric { font: 800 40px/1 "Lexend", sans-serif; margin-bottom: 8px; }
  .build-card { display:grid; gap: 12px; }
  .bar { height: 10px; background: #e5ece8; border-radius: 999px; overflow:hidden; }
  .bar span { display:block; height:100%; border-radius:999px; background: linear-gradient(90deg, var(--green) 0%, var(--green-2) 100%); }
  .day-row { display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .day { height: 38px; display:grid; place-items:center; border-radius: 14px; font: 700 13px/1 "Lexend", sans-serif; background: #ecf0ee; color: var(--muted); }
  .day.done { background: var(--green-soft); color: var(--green); }
  .day.pending { background: #e3f1ff; color: #1769aa; }
  .city-map { min-height: 320px; position: relative; background: radial-gradient(circle at 20% 10%, #ffffff 0%, #edf5f1 55%, #e7efeb 100%); overflow:hidden; }
  .map-node { position:absolute; padding: 12px 14px; border-radius: 20px; background:white; box-shadow: 0 14px 26px rgba(20,40,34,0.10); }
  .map-node strong { display:block; font: 700 14px/1.2 "Lexend", sans-serif; }
  .map-node span { display:block; margin-top: 4px; color: var(--muted); font-size: 12px; }
  .map-node.done { left: 18px; top: 28px; }
  .map-node.active { right: 24px; top: 96px; background: linear-gradient(180deg, #ffffff 0%, #ebfbf2 100%); }
  .map-node.paused { left: 34px; bottom: 42px; }
  .map-node.small { right: 26px; bottom: 26px; }
  .project-list { gap: 14px; }
  .success-state { background: linear-gradient(145deg, #0e513c 0%, #1fa06e 100%); }
  .settings-list { display:grid; gap: 14px; }
  .setting-row { display:flex; align-items:center; justify-content:space-between; gap: 12px; font-size: 14px; }
  .switch { width: 44px; height: 26px; border-radius: 999px; background: #d9e2dd; position: relative; display:inline-block; }
  .switch::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:white; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
  .switch.on { background: rgba(11,122,88,0.28); }
  .switch.on::after { left: 21px; }
  .muted { color: var(--muted); font-size: 12px; }
  .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; padding: 14px 18px 22px; background: linear-gradient(180deg, rgba(245,247,249,0) 0%, rgba(245,247,249,.84) 22%, rgba(245,247,249,1) 100%); }
  .bottom-nav-inner { display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(255,255,255,0.94); border: 1px solid var(--line); border-radius: 28px; padding: 10px; box-shadow: 0 12px 30px rgba(20,40,34,0.1); }
  .nav-btn { border:0; background:none; border-radius: 18px; padding: 10px 8px; display:grid; justify-items:center; gap: 4px; color: var(--muted); font: 700 11px/1 "Lexend", sans-serif; }
  .nav-btn.active { background: var(--green-soft); color: var(--green); }
  .nav-ico { font-size: 18px; }
</style>
</head>
<body>
  <div class="app">
    <div class="status"><span>9:41</span><span class="signals">5G  100%</span></div>
    <header class="header">
      <div class="header-left"><button class='back-btn' onclick="window.location.href='dd84a02c17484df78f3ba23fcda1b02d.html'">‹</button><div class="title-wrap"><div class="screen-title">Choose next week’s project</div><div class="screen-sub">Pick one of three civic builds to shape the city’s identity.</div></div></div>
      
    </header>
    <main>
          <section class="panel">
            <div class="section-head"><span>Available this week</span><span class="muted">3 choices</span></div>
            <div class="project-list">
              <button class="project-option" onclick="window.location.href='dd84a02c17484df78f3ba23fcda1b02d.html'"><strong>Community Park</strong><span>Add green space, benches, and a calm center to your map.</span></button>
              <button class="project-option" onclick="window.location.href='dd84a02c17484df78f3ba23fcda1b02d.html'"><strong>Corner Market</strong><span>Bring color, foot traffic, and a brighter neighborhood core.</span></button>
              <button class="project-option" onclick="window.location.href='dd84a02c17484df78f3ba23fcda1b02d.html'"><strong>River Plaza</strong><span>Create a civic plaza that changes the skyline silhouette.</span></button>
            </div>
          </section>
        </main>
    <nav class="bottom-nav"><div class="bottom-nav-inner"><button class="nav-btn active" onclick="window.location.href='dd84a02c17484df78f3ba23fcda1b02d.html'"><span class="nav-ico">⌂</span><span>Home</span></button><button class="nav-btn" onclick="window.location.href='a6bac7096dc24460afba53881eba7153.html'"><span class="nav-ico">◫</span><span>City</span></button><button class="nav-btn" onclick="window.location.href='143603a41c3b4b56bc7b0a8fbcd2b3f5.html'"><span class="nav-ico">⚙</span><span>Settings</span></button></div></nav>
  </div>
</body>
</html>
