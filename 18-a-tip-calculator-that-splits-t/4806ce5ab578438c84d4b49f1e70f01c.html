<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">

<span class="text-2xl font-bold tracking-tight text-[#dee5ff] dark:text-[#dee5ff] font-manrope">SplitTab</span>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden border border-outline-variant/30">
<img alt="User profile avatar" data-alt="close up of a modern digital user avatar with minimalist features on a clean dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjN3moxPLZPvzexiU1fvAZP8tzob2PKGtcLmwJ33id7_KtViV12GDUnX8PxJ-n9WQv6Lz_ucVR183zeAj7fk39bC-0lPIvXAqbRmnsVtKOhDf_5QoGEWQeMrWWX1Mrqgb4YWsJuasnlultfxBdJSdI1KLb9G_r6lYP5_KwZU9OzIHPHeG-5XqTgZiyKR_kfdmxVK8_uKUqfSxschPoB0wx4I4YdTNm5caJXdag7nKxFGBzWb7h1dNtRLTCGWEamQ6wptvG-wZ44RE"/>
</div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-xl flex flex-col items-center">
<!-- Intentional Asymmetry: Large Editorial Headline -->
<div class="w-full mb-12 text-left">
<p class="font-label text-on-surface-variant uppercase tracking-[0.2em] text-xs mb-3">The Midnight Architect</p>
<h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tighter text-on-background leading-none">
                    Effortless <br/>
<span class="text-primary italic">Precision.</span>
</h1>
</div>
<!-- Main Interactive Card -->
<div class="w-full bg-surface-container-low rounded-[2rem] p-8 md:p-12 relative overflow-hidden group">
<!-- Visual Tonal Depth Element -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl group-hover:bg-primary/10 transition-colors duration-700"></div>
<div class="relative z-10 space-y-10">
<!-- Input Section -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant flex items-center gap-2" for="group-name">
<span class="material-symbols-outlined text-xs" data-icon="label">label</span>
                            Session Identity (Optional)
                        </label>
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant text-2xl md:text-3xl font-headline font-semibold py-4 px-0 focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-on-surface-variant/30 text-on-background" id="group-name" placeholder="Enter group name..." type="text"/>
</div>
<!-- Primary CTA -->
<button class="cta-gradient w-full py-6 rounded-full flex items-center justify-center gap-3 shadow-[0_4px_24px_rgba(78,222,163,0.15)] hover:shadow-[0_8px_32px_rgba(78,222,163,0.25)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 group">
<span class="font-headline font-bold text-lg text-on-primary">Start Splitting</span>
<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Action -->
<div class="flex flex-col items-center pt-4">
<a class="group flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<span class="font-label text-sm tracking-wide">Or join an existing session</span>
<span class="material-symbols-outlined text-sm opacity-50 group-hover:opacity-100" data-icon="login">login</span>
</a>
</div>
</div>
</div>
<!-- Minimalist Trust Indicators / Visual Anchors -->
<div class="mt-16 grid grid-cols-2 gap-12 w-full opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-500">
<div class="flex flex-col border-l border-outline-variant pl-4">
<span class="font-headline text-2xl font-bold text-on-background">Instant</span>
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Calculation</span>
</div>
<div class="flex flex-col border-l border-outline-variant pl-4">
<span class="font-headline text-2xl font-bold text-on-background">Zero</span>
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Signup Required</span>
</div>
</div>
</div>
